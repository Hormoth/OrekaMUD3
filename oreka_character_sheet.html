<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oreka — Character Sheet</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }

#auth-bar { background: #0f3460; padding: 10px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #e94560; }
#auth-bar h1 { color: #e94560; font-size: 16px; letter-spacing: 2px; }
#auth-bar input { padding: 5px 10px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; font-size: 13px; width: 140px; }
#auth-bar button { padding: 5px 14px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
#auth-bar .status { color: #888; font-size: 12px; margin-left: auto; }

#sheet { display: none; max-width: 1100px; margin: 20px auto; padding: 0 20px; }

/* Header */
.sheet-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; padding: 16px; background: #12203a; border-radius: 8px; border: 1px solid #1a3050; }
.sheet-header .name { font-size: 24px; color: #e94560; font-weight: bold; }
.sheet-header .detail { color: #999; font-size: 13px; margin-top: 4px; }
.sheet-header .hp-bar { margin-top: 8px; }
.sheet-header .hp-bar .bar { height: 20px; background: #333; border-radius: 10px; overflow: hidden; }
.sheet-header .hp-bar .fill { height: 100%; background: linear-gradient(90deg, #e94560, #3ddc6b); border-radius: 10px; transition: width 0.5s; }
.sheet-header .hp-text { font-size: 14px; color: #7ec8e3; margin-top: 4px; }

/* Sections */
.section { background: #12203a; border: 1px solid #1a3050; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.section h2 { color: #e94560; font-size: 14px; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #1a3050; padding-bottom: 6px; }

/* Abilities */
.abilities { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.ability-box { text-align: center; background: #0a0a1a; border: 1px solid #1a3050; border-radius: 8px; padding: 12px 8px; cursor: pointer; transition: all 0.2s; }
.ability-box:hover { border-color: #e94560; background: #162040; }
.ability-box .label { font-size: 11px; color: #7ec8e3; letter-spacing: 1px; }
.ability-box .score { font-size: 28px; color: #e0e0e0; font-weight: bold; margin: 4px 0; }
.ability-box .mod { font-size: 16px; color: #e94560; }

/* Saves + Combat */
.combat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.stat-box { text-align: center; background: #0a0a1a; border: 1px solid #1a3050; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; }
.stat-box:hover { border-color: #e94560; }
.stat-box .label { font-size: 11px; color: #7ec8e3; }
.stat-box .value { font-size: 22px; color: #e0e0e0; font-weight: bold; margin-top: 4px; }

/* Skills */
.skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.skill-row { display: flex; justify-content: space-between; padding: 4px 8px; background: #0a0a1a; border-radius: 4px; cursor: pointer; font-size: 13px; }
.skill-row:hover { background: #162040; }
.skill-row .mod { color: #e94560; font-weight: bold; }

/* Feats + Spells */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { display: inline-block; padding: 4px 10px; background: #0a0a1a; border: 1px solid #1a3050; border-radius: 14px; font-size: 12px; color: #7ec8e3; }

/* Equipment */
.equip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.equip-slot { display: flex; justify-content: space-between; padding: 6px 10px; background: #0a0a1a; border-radius: 4px; font-size: 13px; }
.equip-slot .slot-name { color: #888; }

/* Dice roller */
#dice-tray { position: fixed; bottom: 0; left: 0; right: 0; background: #0f3460; border-top: 2px solid #e94560; padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 100; }
#dice-tray .dice-buttons { display: flex; gap: 6px; }
#dice-tray button { padding: 8px 14px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #1a3050; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
#dice-tray button:hover { background: #e94560; color: #fff; border-color: #e94560; }
#dice-result { font-size: 20px; color: #fff; font-weight: bold; min-width: 200px; text-align: center; }
#dice-result .roll-type { font-size: 12px; color: #888; }
#dice-result .roll-value { font-size: 28px; color: #e94560; }
#dice-result .roll-detail { font-size: 12px; color: #999; }
.nat20 { color: #3ddc6b !important; text-shadow: 0 0 10px rgba(61,220,107,0.5); }
.nat1 { color: #e94560 !important; text-shadow: 0 0 10px rgba(233,69,96,0.5); }

/* Two-column layout */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } .abilities { grid-template-columns: repeat(3, 1fr); } }

/* Stats row */
.stats-row { display: flex; gap: 20px; margin-top: 8px; font-size: 12px; color: #888; }
.stats-row span { color: #7ec8e3; }
</style>
</head>
<body>

<div id="auth-bar">
  <h1>OREKA CHARACTER SHEET</h1>
  <input id="username" type="text" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="login-btn">Load Sheet</button>
  <span class="status" id="status">Connecting...</span>
</div>

<div id="sheet">
  <!-- Header -->
  <div class="sheet-header">
    <div>
      <div class="name" id="char-name">—</div>
      <div class="detail" id="char-detail">—</div>
      <div class="detail" id="char-alignment">—</div>
    </div>
    <div>
      <div class="hp-bar">
        <div style="font-size:12px; color:#888; margin-bottom:4px;">Hit Points</div>
        <div class="bar"><div class="fill" id="hp-fill" style="width:100%"></div></div>
        <div class="hp-text" id="hp-text">— / —</div>
      </div>
    </div>
    <div style="text-align:right;">
      <div class="detail">AC: <span id="char-ac" style="font-size:22px; color:#e94560; font-weight:bold;">—</span></div>
      <div class="detail">XP: <span id="char-xp" style="color:#7ec8e3;">—</span></div>
      <div class="detail">Gold: <span id="char-gold" style="color:#ffd700;">—</span></div>
      <div class="stats-row">
        Kills: <span id="stat-kills">0</span> &nbsp;
        Rescues: <span id="stat-rescues">0</span> &nbsp;
        Explored: <span id="stat-rooms">0</span>
      </div>
    </div>
  </div>

  <!-- Abilities -->
  <div class="section">
    <h2>ABILITY SCORES</h2>
    <div class="abilities" id="abilities"></div>
  </div>

  <div class="two-col">
    <!-- Saves -->
    <div class="section">
      <h2>SAVING THROWS</h2>
      <div class="combat-grid" id="saves"></div>
    </div>
    <!-- Combat -->
    <div class="section">
      <h2>COMBAT</h2>
      <div class="combat-grid" id="combat"></div>
    </div>
  </div>

  <div class="two-col">
    <!-- Skills -->
    <div class="section">
      <h2>SKILLS</h2>
      <div class="skills-grid" id="skills"></div>
    </div>
    <!-- Feats -->
    <div class="section">
      <h2>FEATS</h2>
      <div class="tag-list" id="feats"></div>
      <h2 style="margin-top:16px;">SPELLS KNOWN</h2>
      <div class="tag-list" id="spells"></div>
    </div>
  </div>

  <div class="two-col">
    <!-- Equipment -->
    <div class="section">
      <h2>EQUIPMENT</h2>
      <div class="equip-grid" id="equipment"></div>
    </div>
    <!-- Inventory -->
    <div class="section">
      <h2>INVENTORY</h2>
      <div id="inventory"></div>
    </div>
  </div>

  <div style="height: 80px;"></div><!-- spacer for dice tray -->
</div>

<!-- Dice Tray -->
<div id="dice-tray">
  <div class="dice-buttons">
    <button onclick="rollDice(4)">d4</button>
    <button onclick="rollDice(6)">d6</button>
    <button onclick="rollDice(8)">d8</button>
    <button onclick="rollDice(10)">d10</button>
    <button onclick="rollDice(12)">d12</button>
    <button onclick="rollDice(20)">d20</button>
    <button onclick="rollDice(100)">d100</button>
  </div>
  <div id="dice-result">
    <div class="roll-type">Click a die or a stat to roll</div>
    <div class="roll-value">—</div>
    <div class="roll-detail"></div>
  </div>
</div>

<script>
let ws = null;
let sheetData = null;

// ==================== DICE ====================
function rollDice(sides, modifier, label) {
  modifier = modifier || 0;
  label = label || ('d' + sides);
  const roll = Math.floor(Math.random() * sides) + 1;
  const total = roll + modifier;
  const resultEl = document.getElementById('dice-result');
  const typeEl = resultEl.querySelector('.roll-type');
  const valueEl = resultEl.querySelector('.roll-value');
  const detailEl = resultEl.querySelector('.roll-detail');

  typeEl.textContent = label;
  valueEl.textContent = total;
  valueEl.className = 'roll-value';
  if (sides === 20 && roll === 20) { valueEl.classList.add('nat20'); valueEl.textContent = total + ' ★ NAT 20!'; }
  if (sides === 20 && roll === 1) { valueEl.classList.add('nat1'); valueEl.textContent = total + ' ✗ NAT 1'; }
  detailEl.textContent = modifier !== 0 ? ('Roll: ' + roll + ' + ' + modifier + ' modifier') : ('Roll: ' + roll);

  // Brief animation
  valueEl.style.transform = 'scale(1.3)';
  setTimeout(() => { valueEl.style.transform = 'scale(1)'; }, 200);
}

function rollCheck(mod, label) { rollDice(20, mod, label + ' Check (d20+' + mod + ')'); }
function rollSave(mod, label) { rollDice(20, mod, label + ' Save (d20+' + mod + ')'); }
function rollAttack(mod, label) { rollDice(20, mod, label + ' Attack (d20+' + mod + ')'); }

// ==================== SHEET RENDERING ====================
function renderSheet(d) {
  sheetData = d;
  document.getElementById('sheet').style.display = 'block';

  // Header
  document.getElementById('char-name').textContent = d.name;
  document.getElementById('char-detail').textContent =
    'Level ' + d.level + ' ' + d.race + ' ' + d.char_class + (d.title ? ' — ' + d.title : '');
  document.getElementById('char-alignment').textContent =
    (d.alignment || 'Neutral') + (d.deity ? ' • ' + d.deity : '');
  document.getElementById('char-ac').textContent = d.ac;
  document.getElementById('char-xp').textContent = d.xp.toLocaleString();
  document.getElementById('char-gold').textContent = d.gold.toLocaleString();
  document.getElementById('stat-kills').textContent = d.kill_count;
  document.getElementById('stat-rescues').textContent = d.rescued_captives;
  document.getElementById('stat-rooms').textContent = d.rooms_visited;

  // HP bar
  const hpPct = d.max_hp > 0 ? Math.max(0, d.hp / d.max_hp * 100) : 0;
  document.getElementById('hp-fill').style.width = hpPct + '%';
  document.getElementById('hp-text').textContent = d.hp + ' / ' + d.max_hp;

  // Abilities
  const abEl = document.getElementById('abilities');
  abEl.innerHTML = '';
  for (const [name, data] of Object.entries(d.abilities)) {
    const box = document.createElement('div');
    box.className = 'ability-box';
    box.innerHTML = '<div class="label">' + name + '</div><div class="score">' + data.score + '</div><div class="mod">' + (data.mod >= 0 ? '+' : '') + data.mod + '</div>';
    box.onclick = () => rollCheck(data.mod, name);
    abEl.appendChild(box);
  }

  // Saves
  const svEl = document.getElementById('saves');
  svEl.innerHTML = '';
  for (const [name, val] of Object.entries(d.saves)) {
    const box = document.createElement('div');
    box.className = 'stat-box';
    box.innerHTML = '<div class="label">' + name + '</div><div class="value">' + (val >= 0 ? '+' : '') + val + '</div>';
    box.onclick = () => rollSave(val, name);
    svEl.appendChild(box);
  }

  // Combat
  const cbEl = document.getElementById('combat');
  cbEl.innerHTML = '';
  [{label: 'Melee', val: d.melee_attack}, {label: 'Ranged', val: d.ranged_attack}, {label: 'AC', val: d.ac}].forEach(s => {
    const box = document.createElement('div');
    box.className = 'stat-box';
    box.innerHTML = '<div class="label">' + s.label + '</div><div class="value">' + (s.label !== 'AC' ? (s.val >= 0 ? '+' : '') : '') + s.val + '</div>';
    if (s.label !== 'AC') box.onclick = () => rollAttack(s.val, s.label);
    cbEl.appendChild(box);
  });

  // Skills
  const skEl = document.getElementById('skills');
  skEl.innerHTML = '';
  const skills = Object.entries(d.skills || {}).sort((a, b) => a[0].localeCompare(b[0]));
  skills.forEach(([name, val]) => {
    const row = document.createElement('div');
    row.className = 'skill-row';
    row.innerHTML = '<span>' + name + '</span><span class="mod">' + (val >= 0 ? '+' : '') + val + '</span>';
    row.onclick = () => rollCheck(val, name);
    skEl.appendChild(row);
  });
  if (skills.length === 0) skEl.innerHTML = '<div style="color:#666; font-size:13px;">No trained skills.</div>';

  // Feats
  const ftEl = document.getElementById('feats');
  ftEl.innerHTML = '';
  (d.feats || []).forEach(f => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = f;
    ftEl.appendChild(tag);
  });
  if (!d.feats || d.feats.length === 0) ftEl.innerHTML = '<span style="color:#666; font-size:13px;">None.</span>';

  // Spells
  const spEl = document.getElementById('spells');
  spEl.innerHTML = '';
  const spells = d.spells_known || {};
  let spellCount = 0;
  for (const [level, list] of Object.entries(spells)) {
    (Array.isArray(list) ? list : []).forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = s + ' (L' + level + ')';
      spEl.appendChild(tag);
      spellCount++;
    });
  }
  if (spellCount === 0) spEl.innerHTML = '<span style="color:#666; font-size:13px;">None.</span>';

  // Equipment
  const eqEl = document.getElementById('equipment');
  eqEl.innerHTML = '';
  for (const [slot, item] of Object.entries(d.equipment || {})) {
    const row = document.createElement('div');
    row.className = 'equip-slot';
    row.innerHTML = '<span class="slot-name">' + slot + '</span><span>' + (item ? item.name : '(empty)') + '</span>';
    eqEl.appendChild(row);
  }
  if (Object.keys(d.equipment || {}).length === 0) eqEl.innerHTML = '<div style="color:#666;">No equipment data.</div>';

  // Inventory
  const invEl = document.getElementById('inventory');
  invEl.innerHTML = '';
  (d.inventory || []).forEach(item => {
    const row = document.createElement('div');
    row.className = 'equip-slot';
    row.innerHTML = '<span>' + item.name + '</span><span style="color:#888;">' + item.type + (item.value ? ' (' + item.value + 'gp)' : '') + '</span>';
    invEl.appendChild(row);
  });
  if (!d.inventory || d.inventory.length === 0) invEl.innerHTML = '<div style="color:#666;">Empty.</div>';
}

// ==================== CONNECTION ====================
function connect() {
  const host = (location.hostname || '127.0.0.1');
  const wsHost = (location.protocol === 'file:' || !host) ? '127.0.0.1' : host;
  ws = new WebSocket('ws://' + wsHost + ':8767/');
  const statusEl = document.getElementById('status');

  ws.onopen = () => { statusEl.textContent = 'Connected'; statusEl.style.color = '#7ec8e3'; };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === 'auth_result') {
      if (msg.success) {
        statusEl.textContent = 'Logged in as ' + msg.character_name;
        statusEl.style.color = '#3ddc6b';
        document.getElementById('login-btn').textContent = 'Refresh';
        // Request sheet data
        ws.send(JSON.stringify({ type: 'sheet' }));
      } else {
        statusEl.textContent = msg.message || 'Login failed';
        statusEl.style.color = '#e94560';
      }
    } else if (msg.type === 'sheet_data') {
      renderSheet(msg);
    } else if (msg.type === 'welcome') {
      // NPC list received (we don't need it for the sheet, ignore)
    }
  };
  ws.onerror = () => { statusEl.textContent = 'Connection failed'; statusEl.style.color = '#e94560'; };
  ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.style.color = '#888'; };
}

document.getElementById('login-btn').addEventListener('click', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!u || !p) return;
  ws.send(JSON.stringify({ type: 'auth', username: u, password: p }));
});
document.getElementById('password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

connect();
</script>
</body>
</html>
