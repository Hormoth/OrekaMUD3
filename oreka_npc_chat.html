<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oreka — NPC Chat Room</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

#header { background: #0f3460; padding: 14px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #e94560; }
#header h1 { color: #e94560; font-size: 18px; letter-spacing: 2px; }
#header select { padding: 6px 10px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; font-size: 14px; min-width: 240px; }
#header input { padding: 6px 10px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; font-size: 14px; width: 160px; }
#header button { padding: 6px 16px; background: #e94560; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
#header button:hover { background: #ff6b81; }
#header button:disabled { background: #555; cursor: not-allowed; }
#status { color: #888; font-size: 12px; margin-left: auto; }

#npc-banner { display: none; background: #16213e; padding: 12px 20px; border-bottom: 1px solid #0f3460; }
#npc-banner .npc-name { color: #e94560; font-size: 16px; font-weight: bold; }
#npc-banner .npc-desc { color: #999; font-size: 13px; margin-top: 4px; line-height: 1.4; max-height: 40px; overflow: hidden; }
#npc-banner .room-name { color: #7ec8e3; font-size: 12px; margin-top: 2px; }

#chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
.msg.player { background: #0f3460; color: #e0e0e0; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.npc { background: #1e2a4a; color: #ccc; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid #e94560; }
.msg.system { background: transparent; color: #666; font-style: italic; align-self: center; font-size: 12px; }
.msg .sender { font-size: 11px; color: #7ec8e3; margin-bottom: 4px; font-weight: bold; }

#input-bar { display: flex; padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; gap: 8px; }
#input-bar input { flex: 1; padding: 10px 14px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 6px; font-size: 15px; outline: none; }
#input-bar input:focus { border-color: #e94560; }
#input-bar button { padding: 10px 24px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
#input-bar button:hover { background: #ff6b81; }
#input-bar button:disabled { background: #555; }

.typing { color: #888; font-style: italic; font-size: 13px; padding: 4px 20px; }
</style>
</head>
<body>

<div id="header">
  <h1>OREKA NPC CHAT</h1>
  <input id="player-name" type="text" placeholder="Username..." value="">
  <input id="player-pass" type="password" placeholder="Password..." value="">
  <button id="login-btn">Log In</button>
  <span id="login-status" style="font-size:11px; color:#888;"></span>
  <select id="npc-select" disabled><option value="">Connecting...</option></select>
  <button id="start-btn" disabled>Start Chat</button>
  <span id="status">disconnected</span>
</div>

<div id="npc-banner">
  <div class="npc-name" id="banner-name"></div>
  <div class="npc-desc" id="banner-desc"></div>
  <div class="room-name" id="banner-room"></div>
</div>

<div id="chat"></div>
<div id="typing" class="typing" style="display:none;">The NPC is thinking...</div>

<div id="input-bar">
  <input id="msg-input" type="text" placeholder="Type a message..." disabled>
  <button id="send-btn" disabled>Send</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const startBtn = document.getElementById('start-btn');
const npcSelect = document.getElementById('npc-select');
const statusEl = document.getElementById('status');
const typingEl = document.getElementById('typing');
const bannerEl = document.getElementById('npc-banner');
const bannerName = document.getElementById('banner-name');
const bannerDesc = document.getElementById('banner-desc');
const bannerRoom = document.getElementById('banner-room');
const nameInput = document.getElementById('player-name');

let ws = null;
let chatActive = false;
let currentNpc = '';

function addMessage(text, type, sender) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (sender && type !== 'system') {
    const s = document.createElement('div');
    s.className = 'sender';
    s.textContent = sender;
    div.appendChild(s);
  }
  const t = document.createElement('div');
  t.textContent = text;
  div.appendChild(t);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function connect() {
  const host = (location.hostname || '127.0.0.1');
  const wsHost = (location.protocol === 'file:' || !host) ? '127.0.0.1' : host;
  ws = new WebSocket(`ws://${wsHost}:8767/`);
  statusEl.textContent = 'connecting...';
  statusEl.style.color = '#ffcc00';

  ws.onopen = () => {
    statusEl.textContent = 'connected';
    statusEl.style.color = '#7ec8e3';
  };

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'auth_result') {
      if (msg.success) {
        loginStatus.textContent = msg.message || 'Logged in!';
        loginStatus.style.color = '#3ddc6b';
        loginBtn.disabled = true;
        nameInput.disabled = true;
        passInput.style.display = 'none';
        addMessage(msg.message, 'system');
      } else {
        loginStatus.textContent = msg.message || 'Login failed.';
        loginStatus.style.color = '#e94560';
      }
    }
    else if (msg.type === 'welcome') {
      npcSelect.innerHTML = '';
      (msg.npcs || []).forEach(npc => {
        const opt = document.createElement('option');
        opt.value = npc.vnum;
        opt.textContent = `${npc.name} (${npc.room_name || 'unknown'})`;
        npcSelect.appendChild(opt);
      });
      npcSelect.disabled = false;
      startBtn.disabled = false;
      addMessage(msg.message || 'Connected. Pick an NPC and click Start Chat.', 'system');
    }
    else if (msg.type === 'started') {
      chatActive = true;
      currentNpc = msg.npc_name;
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
      bannerName.textContent = msg.npc_name;
      bannerDesc.textContent = msg.npc_description || '';
      bannerRoom.textContent = msg.room_name ? `Location: ${msg.room_name}` : '';
      bannerEl.style.display = 'block';
      if (msg.auth_note) addMessage(msg.auth_note, 'system');
      // Show the NPC's greeting as the opening message
      if (msg.greeting) {
        addMessage(msg.greeting, 'npc', msg.npc_name);
      } else {
        addMessage(`You are now speaking with ${msg.npc_name}.`, 'system');
      }
    }
    else if (msg.type === 'response') {
      typingEl.style.display = 'none';
      sendBtn.disabled = false;
      inputEl.disabled = false;
      addMessage(msg.text, 'npc', msg.npc_name);
      inputEl.focus();
    }
    else if (msg.type === 'error') {
      typingEl.style.display = 'none';
      addMessage(`Error: ${msg.message}`, 'system');
    }
  };

  ws.onerror = () => {
    statusEl.textContent = 'error';
    statusEl.style.color = '#e94560';
  };

  ws.onclose = () => {
    statusEl.textContent = 'disconnected';
    statusEl.style.color = '#888';
    npcSelect.disabled = true;
    startBtn.disabled = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    chatActive = false;
    addMessage('Disconnected. Reload to reconnect.', 'system');
  };
}

const loginBtn = document.getElementById('login-btn');
const passInput = document.getElementById('player-pass');
const loginStatus = document.getElementById('login-status');

loginBtn.addEventListener('click', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const username = nameInput.value.trim();
  const password = passInput.value.trim();
  if (!username || !password) { loginStatus.textContent = 'Enter username + password'; return; }
  loginStatus.textContent = 'Authenticating...';
  loginStatus.style.color = '#ffcc00';
  ws.send(JSON.stringify({ type: 'auth', username: username, password: password }));
});
passInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loginBtn.click();
});

startBtn.addEventListener('click', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const vnum = parseInt(npcSelect.value);
  if (isNaN(vnum)) return;
  const name = nameInput.value.trim() || 'Visitor';
  chatEl.innerHTML = '';
  ws.send(JSON.stringify({ type: 'start', npc_vnum: vnum, player_name: name }));
});

function sendMessage() {
  if (!chatActive || !ws || ws.readyState !== WebSocket.OPEN) return;
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage(text, 'player', nameInput.value.trim() || 'You');
  ws.send(JSON.stringify({ type: 'message', text: text }));
  inputEl.value = '';
  typingEl.style.display = 'block';
  sendBtn.disabled = true;
  inputEl.disabled = true;
  chatEl.scrollTop = chatEl.scrollHeight;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// Auto-connect on load
connect();
</script>
</body>
</html>
