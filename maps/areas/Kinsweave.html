The natural lava-tube widens into a cavern-like chamber whose floor is cracked with thin veins of still-warm basalt. Ahead, the source of the heat: a doorway-arch of Pekakarlik cut, glowing faintly amber from within. Two Dark Dwarves stand before the arch, their armor warded against heat, their axes drawn.</title><rect x="3432" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3492.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5318</text><text x="3492.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Highridge Lava-Tube …</text>
</g>
<g><title>vnum 5319
Highridge Lava-Tube -- The Artifact Chamber

A round chamber whose walls are inscribed with Pekakarlik warding-sigils, most now cracked or dulled from centuries of slow failure. At the center, set into a pedestal of smooth black stone, is the artifact: a Deceiver-made prism that glows a steady amber from within. The Keeper's channeling-apparatus surrounds the pedestal. The air here is over 120 degrees and getting hotter.</title><rect x="3580" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3640.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5319</text><text x="3640.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Highridge Lava-Tube …</text>
</g>
<g><title>vnum 5320
Highridge Lava-Tube -- Dark Dwarf Barracks

A side-chamber that the Keeper's Dark Dwarf guards use as a barracks and mess. Their armor hangs on pegs along one wall; a long trestle-table dominates the room. A small forge-stone in one corner is kept perpetually warm for maintaining the guards' gear.</title><rect x="3728" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3788.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5320</text><text x="3788.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Highridge Lava-Tube …</text>
</g>
<g><title>vnum 5321
Highridge Lava-Tube -- Forge-Warded Vault

A secondary strongroom, its door protected by Pekakarlik heat-wards repurposed by the Keeper. Inside are crates of rare forge-metals she has siphoned from Highridge's own foundries, bar by bar, over ten years of patient theft. The Taraf-Imro scholars believe the losses are normal wastage. They are not.</title><rect x="3876" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3936.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5321</text><text x="3936.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Highridge Lava-Tube …</text>
</g>
<g><title>vnum 5322
Highridge Lava-Tube -- Secondary Chamber

A small natural cavern the Keeper uses for experiments she does not want the translation staff to observe. A circular work-table holds instruments of various provenance; the floor is scored with concentric channels for containing spilled reagents. The chamber has been used recently -- fresh scorch-marks crisscross the stone.</title><rect x="4024" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4084.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5322</text><text x="4084.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Highridge Lava-Tube …</text>
</g>
<g><title>vnum 5323
Highridge Lava-Tube -- Escape Crevasse

A natural crevasse leading off into the deep rock of the mountain. The Keeper can descend this crevasse in an emergency to eventually emerge on the far side of Highridge, miles from the city walls. She has rehearsed the descent three times in ten years. She has not yet had to use it.</title><rect x="4172" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4232.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5323</text><text x="4232.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Highridge Lava-Tube …</text>
</g>
<g><title>vnum 5324
Andrio Giant Chamber -- Expedition Antechamber

The existing Giant antechamber has been thoroughly commandeered. Silentborn-made camp-cots line the walls; writing-desks have been set up between the colossal stone columns; a rope-and-pulley lift has been rigged from the ceiling to the floor for lowering heavy gear. The expedition's banner -- an empty iron circle -- hangs from the nearest column.</title><rect x="4320" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4380.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5324</text><text x="4380.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5325
Andrio Giant Chamber -- Supply Station

Crates, barrels, and sealed water-vessels stacked in a rough grid. A quartermaster's clipboard hangs on a peg; the inventory is rigorous. A Silentborn loyalist sits on a crate, polishing his longsword with thoughtful care. The supplies suggest the expedition plans to remain in the undercroft for months.</title><rect x="4468" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4528.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5325</text><text x="4528.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5326
Andrio Giant Chamber -- Expedition Leader's Camp

The expedition's command tent, pitched in the widest part of the antechamber. Maps of the Giant undercroft, annotated in three different hands, cover the central work-table. A powerfully-built Half-Dómnathar in traveling leathers stands at the table, one hand on the pommel of a greatsword, the other tracing a line across the map. He looks up without surprise. He has been expecting this.</title><rect x="4616" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4676.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5326</text><text x="4676.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5327
Andrio Giant Chamber -- Porters' Quarters

A crude lean-to of canvas draped between two Giant columns, sheltering the expedition's goblin porter-gang. The goblins are not permitted to sit on the expedition's proper cots. They are, however, fed regularly -- a precaution against mutiny that the expedition's Silentborn officers insisted on.</title><rect x="4764" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4824.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5327</text><text x="4824.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5328
Andrio Giant Chamber -- Guard Post

A Silentborn guard-station controlling access to the deeper undercroft. A wooden barrier has been set up across the way west, with a rope-gate to admit authorized personnel. Two Silentborn stand the watch in rotating shifts; the current pair do not speak.</title><rect x="4912" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4972.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5328</text><text x="4972.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5329
Andrio Giant Chamber -- Descent Shaft

A vertical shaft descends through the Giant-cut stone, lined with Pekakarlik iron rungs the expedition's Dark Dwarves have installed for safer climbing. The shaft was cut by the Giants themselves for access to the deeper undercroft. It is wider than a natural shaft would need to be, because Giants were larger than anyone currently living.</title><rect x="5060" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="5120.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5329</text><text x="5120.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5330
Andrio Giant Chamber -- Giant Colonnade

A vast hall whose columns are each the span of two grown people across their base, arranged in rows that suggest a temple or court of giants. The ceiling is lost in shadow far above. The hall has a ceremonial quality: somewhere at the far end, a processional dais for beings of enormous size is dimly visible.</title><rect x="5208" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="5268.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5330</text><text x="5268.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5331
Andrio Giant Chamber -- Collapsed Section

A portion of the colonnade where the ceiling has fallen in, a tumbled pile of dressed stone and broken columns. The expedition's Dark Dwarves have begun clearing a path around the fall. Their tools -- picks, braces, measuring-cords -- are neatly stacked at the work-site. No workers are currently present.</title><rect x="5356" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="5416.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5331</text><text x="5416.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5332
Andrio Giant Chamber -- The Sand Wraith's Lair

A side-chamber that the Dark Dwarves accidentally broke through two weeks ago. Inside, something ancient has awakened: a Sand Wraith of Deceiver-War vintage, desiccated centuries ago but now aware and hostile. The air here draws moisture from any lungs that breathe it. The Dark Dwarves have since sealed the chamber, but the seal is imperfect.</title><rect x="5504" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="5564.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5332</text><text x="5564.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5333
Andrio Giant Chamber -- Dark Dwarf Tunnel Camp

A secondary work-camp for the expedition's Dark Dwarf tunnelers, off the main colonnade. Braces of dressed timber, iron wedges, and small steam-hammers rest in neat piles. Two Dark Dwarf warriors sit on the floor, sharing a meal of cold meat and harder bread.</title><rect x="5652" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="5712.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5333</text><text x="5712.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5334
Andrio Giant Chamber -- Pillar of Oaths

A single smooth-cut pillar stands in the colonnade hall, its surface carved from base to vanishing-point with names in Giant-script. This is a memorial-column, each name a Giant who swore an oath and kept it. The expedition's translator is here somewhere along its height: the column lists the seven Giant defenders who buried the artifact players have come to retrieve.</title><rect x="5800" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="5860.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5334</text><text x="5860.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5335
Andrio Giant Chamber -- Preparation Hall

A secondary chamber the expedition uses for preparation-rituals before descending into the deeper vaults. A shallow pool of clean water; a folding-rack of ritual robes; a shelf of carefully-labeled oils and unguents. A Silentborn battle-priest stands at a worktable, laying out equipment for a coming ritual.</title><rect x="5948" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6008.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5335</text><text x="6008.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5336
Andrio Giant Chamber -- Deeper Stair

A long stair of Giant-scaled steps -- each riser knee-high to a human -- descends into the deeper vaults. The expedition has laid wooden step-ladders over the worst sections to make them passable. Torchlight below suggests the stair opens into another large chamber.</title><rect x="6096" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6156.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5336</text><text x="6156.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5337
Andrio Giant Chamber -- Giant Archive

A vaulted hall lined with slate tablets set into the walls. The tablets are Giant-sized; reading them is a physical challenge as well as a scholarly one. They record -- the expedition's translator has confirmed -- the Giants' ancient war with the Deceivers, and the burial-rite for the artifact buried in the deepest vault.</title><rect x="6244" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6304.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5337</text><text x="6304.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5338
Andrio Giant Chamber -- Vault Approach

A narrow passage compared to the Giant halls above, dug by the expedition's Dark Dwarves through a previously-unbreached section of stone. The walls show fresh tool-marks. The passage terminates ahead at a great stone door incised with Giant-script warnings that the translator refused to read aloud.</title><rect x="6392" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6452.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5338</text><text x="6452.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5339
Andrio Giant Chamber -- The Seal Chamber

A circular hall whose floor bears a complex interlocking seal of seven overlapping sigils -- one for each of the Giant defenders named on the Pillar of Oaths. The seal has been partially breached: the expedition's dark-workings have burnt through three of the seven sigils. Four remain intact. Doing something about those four is the expedition's current objective.</title><rect x="6540" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6600.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5339</text><text x="6600.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5340
Andrio Giant Chamber -- Sigil Study

A small alcove off the Seal Chamber where the expedition's research team studies the remaining sigils. A portable desk holds detailed sketches, theories, and a small stack of Deceiver-era reagents purchased at considerable cost from Spur Tower quartermasters. The work is careful and slow.</title><rect x="6688" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6748.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5340</text><text x="6748.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5341
Andrio Giant Chamber -- Researcher's Cell

A small private cell for the Half-Dómnathar expedition-leader's personal use, spartanly furnished. A cot, a writing-desk, a weapon-stand. A locked document-case holds his private orders -- sealed under the House Leader's personal sign, a detail the expedition's rank-and-file do not know.</title><rect x="6836" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="6896.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5341</text><text x="6896.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5342
Andrio Giant Chamber -- The Dread Wraith's Hall

Beyond a barricade of tumbled stone -- the four intact sigils still gleaming dimly -- lies a vast hall the expedition has not yet entered. At its center, dimly visible, a tall spectral figure stands vigil: a Giant general who died defending the seal, three millennia ago, and whose hatred for Dómnathar kind has only grown in death. Its voice, when it speaks, will drop the temperature of the air by twenty degrees.</title><rect x="6984" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="7044.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5342</text><text x="7044.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5343
Andrio Giant Chamber -- The Relic Vault

Beyond the Dread Wraith's vigil lies the Giant-built vault proper. On a low pedestal of black stone rests the artifact: a small cube of dark metal, no larger than a clenched fist, carved on every face with Deceiver-era script. Even from across the chamber, its presence makes the teeth ache. Three millennia of Giant guard-magic have, just barely, held.</title><rect x="7132" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="7192.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5343</text><text x="7192.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5344
Andrio Giant Chamber -- Beyond the Seal

Past the Relic Vault, a low corridor leads into darkness the expedition has not mapped. A small stone door in the far wall bears a Giant-script inscription too worn to fully read. Beyond it, according to the Archive tablets, lies 'the rest of what they buried.' The expedition has not risked opening the door. Not yet.</title><rect x="7280" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="7340.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5344</text><text x="7340.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5345
Andrio Giant Chamber -- The Old King's Tomb

A secondary vault off the Seal Chamber, built into Giant-cut alcoves in the wall, housing the sarcophagus of one of the Seven -- a Giant defender named on the Pillar of Oaths. His stone effigy shows him in full battle-harness, greatsword across his chest. His face is serene. The sarcophagus has been opened; his grave-goods have been taken.</title><rect x="7428" y="3136" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="7488.0" y="3154" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5345</text><text x="7488.0" y="3198.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Andrio Giant Chamber…</text>
</g>
<g><title>vnum 5400
Road to Rivertop â€' Stonefall Junction

The road west from Stonefall meets the main Kinsweave road here at a carved stone waymarker. One face reads 'Stonefall â€' 1 hour'; another reads 'Rivertop â€' 4 hours by river road'; a third reads 'Chapel â€' South Road, 6 hours'. The junction is exposed to the mountain weather, and a stone windbreak shelter with a fire-striker kit is maintained by the Stonefall city guard for travellers caught here in storms. The road is well-maintained in both directions.</title><rect x="1508" y="324" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="342" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5400</text><text x="1568.0" y="386.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Road to Rivertop â€'…</text>

<g><title>vnum 5401
Road to Rivertop â€' River Approach

The road from Stonefall descends from the mountain foothills toward the Great River valley, the terrain shifting from bare rock to scrubby grassland and then to the river-fed vegetation of the lowlands. The sound of the Great River becomes audible before it is visible. This section of road sees regular traffic â€' quarry carts heading toward Rivertop's docks, traders coming the other way with river goods. The road surface is maintained but not dressed, its stones settled by years of heavy use.</title><rect x="768" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="828.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5401</text><text x="828.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Road to Rivertop â€'…</text>

Road to Highridge â€' North Approach
