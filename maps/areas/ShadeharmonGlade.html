<g><title>vnum 5206
Eastern Forest Road

A well-worn path leads east from Custos do Aeternos into the old-growth forest. The trees here are tall and ancient, their canopy filtering the light into shifting patterns of green and gold. The road narrows as it leaves the city behind, and the sounds of civilization fade into birdsong and the creak of branches. A weathered signpost points east: 'Shadeharm Glade - DO NOT ENTER.'</title><rect x="28" y="176" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="88.0" y="194" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5206</text><text x="88.0" y="238.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Eastern Forest Road</text>
</g>
<g><title>vnum 5207
Forest Approach

The forest deepens around you. The trees are older here than anything near the city, their trunks wide enough to hide behind. The undergrowth is thick with fern and creeping vine. The air smells faintly electrical, like the moments before a storm, though the sky above the canopy is clear. Signs in four languages are nailed to the trees at intervals: 'Shadeharm Glade - Restricted Area - Do Not Enter.' The path splits north and south along the treeline ahead.</title><rect x="176" y="176" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="236.0" y="194" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5207</text><text x="236.0" y="238.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Forest Approach</text>
</g>
<g><title>vnum 5208
Northern Treeline

The northern edge of the Shadeharm Glade. The trees here form an almost deliberate wall, their roots intertwined beneath the earth. You can feel a faint pressure in the air, like standing at the edge of a waterfall you cannot see. Through gaps in the foliage, you glimpse the valley floor below -- a sea of dense fern stretching to a low stone structure at the center.</title><rect x="176" y="28" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="236.0" y="46" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5208</text><text x="236.0" y="90.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Northern Treeline</text>
</g>
<g><title>vnum 5209
Southern Treeline

The southern approach to the Shadeharm Glade. Massive old-growth trees cast deep shadows here. The undergrowth has been recently disturbed -- broken fern fronds, scuffed earth, the faint impression of boots in soft soil. Someone has been spending time here. A low ridge of exposed rock provides a natural lookout over the approach from the city road.</title><rect x="176" y="324" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="236.0" y="342" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5209</text><text x="236.0" y="386.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Southern Treeline</text>
</g>
<g><title>vnum 5210
The Harmony Ward

You step past the treeline and feel... nothing. The ward lets you through without resistance, which means your Kin-sense is intact. The valley opens before you: a shallow bowl of land roughly four hundred feet across, blanketed in waist-high fern. The air is different here -- still, watchful, charged with something older than the city. At the center of the valley, barely visible through the undergrowth, a low stone cairn squats like a patient sentinel. To the east, near the ward's inner boundary</title><rect x="324" y="176" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="384.0" y="194" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5210</text><text x="384.0" y="238.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Harmony Ward</text>
</g>
<g><title>vnum 5211
Glade Interior - North

Dense fern rises to your waist as you push through the glade's interior. The silence here is profound -- no birdsong, no insects, not even wind. The harmony ward saturates everything with a low, thrumming stillness. The stone cairn is visible to the south, and the northern treeline behind you. The fern here is undisturbed. Whatever is happening in this glade, it's concentrated to the east and south.</title><rect x="324" y="28" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="384.0" y="46" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5211</text><text x="384.0" y="90.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Glade Interior - North</text>
</g>
<g><title>vnum 5212
The Probe Array

A crescent of seven small stone tokens has been carefully planted in the earth, linked by precise chalk lines that glow faintly in the dim light. This is no natural formation -- someone with knowledge of abjuration magic has been methodically probing the harmony ward's resonance frequency. The chalk lines pulse with a rhythm that almost, but not quite, matches the ward's own hum. Whoever built this has been working for days. They are close to finding the ward's blind spot.</title><rect x="472" y="176" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="194" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5212</text><text x="532.0" y="238.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Probe Array</text>
</g>
<g><title>vnum 5213
The Sealed Cairn

At the very center of the Shadeharm Glade stands a low stone structure -- a cairn roughly twelve feet across, built from fitted granite blocks so precisely joined that no mortar was needed. There is no door, no visible mechanism, no handle or keyhole. The surface is etched with symbols in a pre-Shattering script that seems to shift when you look at it directly.

Through a narrow gap between two of the capstones, barely visible: a crystalline object about the size of a fist, emitting a very dim a</title><rect x="324" y="324" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="384.0" y="342" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 5213</text><text x="384.0" y="386.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Sealed Cairn</text>
