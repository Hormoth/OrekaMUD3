<g><title>vnum 13000
Clifftide — Cliff Gate

Massive timber-and-stone gates stand open between two squared-off guard towers, marking the landward entrance to Clifftide enclave. The construction is unmistakably Farborn — no scrollwork, no carved flourishes, just precisely fitted stone and ironbound oak built to withstand siege. Legion banners snap in the salt wind above, their device a broken chain on grey. Kin visitors often hesitate at this threshold, their kin-sense registering the faint wrongness of Breach Static from the Farborn guards</title><rect x="620" y="472" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="490" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13000</text><text x="680.0" y="534.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Cliff Gate</text>
</g>
<g><title>vnum 13001
Clifftide — Sea-Wall Path (East)

A broad stone path runs along the top of a thick sea-wall that protects Clifftide's lower buildings from storm surge. The wall is Farborn engineering at its most practical — rough-hewn granite blocks fitted without mortar, angled to deflect wave force rather than resist it head-on. Salt spray mists upward from the rocks below, and seabirds wheel overhead in raucous clouds. To the south, the enclave's buildings step down the cliff face in orderly terraces.</title><rect x="472" y="472" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="532.0" y="490" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13001</text><text x="532.0" y="534.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Sea-Wall…</text>
</g>
<g><title>vnum 13002
Clifftide — Sea-Wall Path (West)

The sea-wall path continues westward, offering a commanding view of the grey-green ocean stretching to the horizon. Wind-scoured flagstones underfoot bear the wear of three centuries of Farborn boots. A stone bench has been set into the wall's inner face, worn smooth by generations of sentries taking their rest between watches. The crash of waves against the cliff base below is a constant, rhythmic thunder that never quite fades from awareness.</title><rect x="324" y="472" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="490" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13002</text><text x="384.0" y="534.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Sea-Wall…</text>
</g>
<g><title>vnum 13003
Clifftide — Lookout Tower

A square stone tower rises from the western end of the sea-wall, its flat roof bristling with signal flags and a bronze fire-basket for night warnings. The tower is the highest point in Clifftide, and from its base the entire enclave is visible — terraced buildings stepping down the cliff, the stable yards to the south, the fishing dock far below. Farborn sentries maintain a round-the-clock watch here, scanning both sea and land with the ingrained vigilance of a people who remember what it means</title><rect x="176" y="472" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="490" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13003</text><text x="236.0" y="534.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Lookout …</text>
</g>
<g><title>vnum 13004
Clifftide — Training Yard

A flat expanse of packed earth and crushed shell serves as Clifftide's primary training ground, surrounded by weapon racks and practice dummies made of salt-hardened timber. Farborn soldiers drill here daily regardless of weather, their movements precise and synchronized in a tradition passed down from the slave-legions that won their freedom at Dark Dawn. The yard bears scorch marks, gouges, and the particular scuffs of heavy shield work. Even off-duty Farborn move through this space with an un</title><rect x="620" y="324" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="342" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13004</text><text x="680.0" y="386.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Training…</text>
</g>
<g><title>vnum 13005
Clifftide — Barracks Row (North)

A row of long, low stone buildings lines both sides of this narrow lane, their timber doors identically spaced and uniformly maintained. These are the barracks of Clifftide's standing garrison, each building housing a squad of eight in the old Legion fashion. The interiors are spartan — stacked bunks, weapon pegs, shared footlockers. Salt wind whistles between the buildings, carrying the smell of the sea and the clang of the training yard to the south.</title><rect x="472" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="532.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13005</text><text x="532.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Barracks…</text>
</g>
<g><title>vnum 13006
Clifftide — Barracks Row (South)

The barracks lane continues between more identical stone buildings, though here a few personal touches have crept in over the centuries — a wind chime of shell and iron, a carved driftwood figure in a window niche, a small herb pot sheltered from the wind. These small rebellions against uniformity speak to the Farborn's gradual evolution from military unit to community. The lane opens eastward toward the heart of the enclave and westward toward the forge-shrine.</title><rect x="324" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13006</text><text x="384.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Barracks…</text>
</g>
<g><title>vnum 13007
Clifftide — Gonmareck Ritler Forge-Shrine

Heat and the ring of hammer on anvil pour from this open-fronted stone building where forge and altar are one and the same. The shrine to Gonmareck Ritler, god of smiths and discipline, is the strongest religious bridge between Farborn and Kin — here the Farborn's reverence for craft and order finds its purest expression. A great iron anvil serves as both working surface and altar, its face inscribed with prayers in the angular Farborn script. The forge fire never goes out, tended in shifts by d</title><rect x="176" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13007</text><text x="236.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Gonmarec…</text>
</g>
<g><title>vnum 13008
Clifftide — Armory

Iron-banded doors open into a cool, dry chamber carved directly into the cliff face, its walls lined with weapon racks and armor stands maintained to exacting Legion standards. Every blade is oiled, every shield strap supple, every spearhead sharp — the Farborn have never forgotten the cost of unpreparedness. A senior armorer oversees the collection with the quiet authority of a librarian guarding irreplaceable texts. The armory connects to the forge-shrine above, ensuring a constant flow of rep</title><rect x="176" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13008</text><text x="236.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Armory</text>
</g>
<g><title>vnum 13009
Clifftide — Commander's Hall

The largest building in Clifftide serves as both seat of governance and strategic command center for the entire Chainless Legion. Stone walls two feet thick surround a central hall where Commander Drath Steelborn holds council. A great table of salt-bleached oak dominates the room, its surface scored with map lines and campaign markers from three hundred years of coastal defense. The hall is austere but not cold — banners of the freed legions hang from the rafters, each one representing a unit t</title><rect x="620" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13009</text><text x="680.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Commande…</text>
</g>
<g><title>vnum 13010
Clifftide — Mess Hall

Long trestle tables and benches fill this broad, low-ceilinged hall where the garrison and much of the civilian population take their meals communally. The smell of salted fish stew, dense bread, and kelp broth hangs permanently in the air. Meals are served at fixed times in the old military fashion, though families now eat together rather than by squad. A great iron cauldron hangs over a central fire pit, large enough to feed the entire enclave in lean times.</title><rect x="324" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 13010</text><text x="384.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clifftide — Mess Hall</text>
</g>
<g><title>vnum 13011
Clifftide — Residential Quarter (North)

</g>
