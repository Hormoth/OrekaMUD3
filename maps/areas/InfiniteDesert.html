Kharazhad â€' Gate Road

<g><title>vnum 8002
Kharazhad â€' Central Market

Kharazhad â€' High Thane's Hall

<g><title>vnum 8004
Kharazhad â€' Temple of the Lady of Fire

The caravan route bends sharply here to avoid the nearest Glass Wastes field â€' the bend was established by Pekakarlik caravan masters generations ago when the dead-Kin-sense zone was first recognized as a navigation and survival hazard. A cairn of white-painted stones marks the bypass turn with exaggerated clarity, and a painted warning-board in six scripts has been maintained by the Sandsong chapter since someone tried to take the direct route and was not seen again.</title><rect x="2248" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2308.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8308</text><text x="2308.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Desert Road â€' Glas…</text>
</g>
<g><title>vnum 8309
Desert Road â€' Midpoint Water Cache

A large water cache buried beneath the surface â€' insulated stone containers sealed against heat and sand infiltration â€' provides emergency water at the midpoint of the longest unsupported section of the caravan route. The cache location is known to licensed caravan masters and Sand Warden chapter members; it is not marked on any public map. The cache is never to be used for convenience, only for genuine emergency â€' a social compact enforced entirely by reputation and the understanding that</title><rect x="2396" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2456.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8309</text><text x="2456.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Desert Road â€' Midp…</text>
</g>
<g><title>vnum 8310
Desert Road â€' Ruin Outlook

From a low rise in the terrain â€' barely visible as a hill but enough to extend sightlines â€' the outer ruins of the Giant oasis-city are visible to the north, and the discolored patch of the Glass Wastes to the west. The vantage is used by caravan scouts and Sand Warden rangers as a standard observation point. A fire-signal platform here can relay information to both Sandsong and the oasis-city ruin camp simultaneously.</title><rect x="2692" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2752.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8310</text><text x="2752.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Desert Road â€' Ruin…</text>
</g>
<g><title>vnum 8311
Desert Road â€' Ashgarin Fold Eastern Branch

The branch road toward Ashgarin Fold leaves the main caravan route here, heading east-northeast toward the volcanic highlands. The surface improves markedly â€' the Fold's Orean quarriers maintain this section as their supply road, and the hardpack is rolled and graded regularly. The smell of volcanic sulfur becomes intermittently detectable on easterly winds from here onward.</title><rect x="2840" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2900.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8311</text><text x="2900.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Desert Road â€' Ashg…</text>
</g>
<g><title>vnum 8331
Scorchspires â€' Western Approach

The volcanic peaks of the Scorchspires rise from the desert floor with the abruptness of geological violence â€' no foothills, no gradual transition, just sand and then rock that leans over you at angles that seem to defy stable geology. The stone is dark red and black, heat-fractured into columns and overhangs. Rarozhki Dwarf patrol markers â€' iron stakes with clan-sigil brands â€' appear at intervals indicating the Kharazhad territorial boundary.</title><rect x="916" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="976.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8331</text><text x="976.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scorchspires â€' Wes…</text>
</g>
<g><title>vnum 8332
Scorchspires â€' Emberfang Ridge

The Emberfang peaks are named for the way their summits, when viewed from the desert at sunset, resemble a row of teeth with fire behind them. The ridge here is a series of jagged basalt columns rising from a hardpan floor scattered with volcanic ejecta â€' rocks that cooled mid-flight and struck the ground with enough force to half-bury themselves. The air smells of active geology: minerals, heat, and the faint sweetness of volcanic gas at concentrations that cause headache but not immediate da</title><rect x="1656" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8332</text><text x="1716.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scorchspires â€' Emb…</text>
</g>
<g><title>vnum 8333
Scorchspires â€' Rarozhki Watch Station

A watch station built into a natural basalt overhang commands views across both the desert approaches and the upper volcanic terrain. Rarozhki rangers in heat-resistant gear rotate through three-day shifts here, monitoring for both external intrusion and the internal geological signals â€' smoke patterns, ground tremors, gas emission changes â€' that warn of volcanic activity. The station's fire-signal equipment is maintained in daily readiness.</title><rect x="1804" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8333</text><text x="1864.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scorchspires â€' Rar…</text>
</g>
<g><title>vnum 8334
Scorchspires â€' Volcanic Flow Field

A historical lava flow â€' several centuries old by Rarozhki records â€' has cooled into a field of ropy, twisted stone that is navigable but deeply disorienting. The flow field extends east from the ridge to a vent field where secondary vents release steam and gas in unpredictable locations. The Embersteel ore that Kharazhad depends on is most concentrated in areas like this one, and Rarozhki mining expeditions work the field's eastern margins.</title><rect x="1804" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8334</text><text x="1864.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scorchspires â€' Vol…</text>
</g>
<g><title>vnum 8335
Scorchspires â€' Upper Vent Field

The upper reaches of the Scorchspires expose the active geological processes that created the Rarozhki way of life â€' steam vents, sulfur deposits, and small lava channels that flow in predictable seasonal patterns. The Rarozhki navigate this terrain with practiced ease, reading the geological signs that tell them where new vents may open and which channels are safe to cross. For visitors, the terrain is genuinely dangerous without a guide.</title><rect x="1952" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8335</text><text x="2012.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scorchspires â€' Upp…</text>
</g>
<g><title>vnum 8346
Great River Gorge â€' Upper Rim Overlook

The rim of the Great River Gorge provides the most dramatic geological view in the Infinite Desert â€' a canyon three hundred feet deep whose vertical walls expose strata representing millions of years of desert history. The river below is audible as a constant roar that varies in pitch with the season. The Pekakarlik settlements are visible as carved interruptions in the wall-face across the gorge, connected by boat traffic invisible at this distance.</title><rect x="916" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="976.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8346</text><text x="976.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8347
Great River Gorge â€' Descent Path

A switchback trail descends the gorge's eastern wall, its surface cut and maintained by Pekakarlik engineers who have been improving the original Giant-carved path for centuries. The trail is safe by desert standards â€' maintained rope anchors, drainage channels, and widened passing-places for loaded animals â€' but requires several hours to descend and a certain commitment of attention on the narrower sections. The sound of the river grows with every switchback.</title><rect x="1360" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8347</text><text x="1420.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8348
Great River Gorge â€' River Terrace

A natural terrace about a third of the way down the gorge wall provides a rest point on the descent and a launching site for Pekakarlik small craft that can be lowered from here rather than requiring the full descent to river level. The terrace surface is covered with river-smooth stones deposited by ancient flood events when the river ran much higher. A carved Pekakarlik relief on the terrace wall records water levels from historical floods â€' the highest mark is alarming.</title><rect x="1360" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8348</text><text x="1420.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8349
Great River Gorge â€' River Level North

At river level, the gorge is a different world from the desert above â€' cool, wet, and green with riparian vegetation that clings to every crack in the stone walls. The Great River runs fast and deep here, its current carrying the snowmelt of the Giant's Teeth hundreds of miles to the north. Pekakarlik dock structures are visible up and downstream, connected by a system of rope-ferries that allows crossings without fighting the current.</title><rect x="1360" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8349</text><text x="1420.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8350
Great River Gorge â€' Western Rim Road

A road follows the gorge's western rim, providing the primary land route between the northern and southern desert along the river corridor. Caravan traffic moves in both directions throughout the day, and the road is wide enough for two carts to pass. Rarozhki stone markers at intervals note distance to Kharazhad and the major settlements. In mid-afternoon the western-rim road is entirely in the sun and the heat on exposed stone is brutal.</title><rect x="620" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8350</text><text x="680.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8351
Great River Gorge â€' Cliff-Face Settlement (North Tier)

A Pekakarlik cliff-face settlement occupies this section of the gorge's eastern wall â€' apartments carved into the rock, their entrances barely visible from across the gorge, their exteriors hung with fishing lines that extend over the river below. The settlement has a private quality; the Pekakarlik here are engaged in the business of river life and trade, not tourism. Visitors are accommodated practically rather than warmly.</title><rect x="1508" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1568.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8351</text><text x="1568.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8352
Great River Gorge â€' Cliff-Face Settlement (South Tier)

The southern tier of the gorge settlement connects to the tunnelworks that extend beneath the river, a network that the Pekakarlik Flowkeepers maintain continuously. A repair team is almost always visible working on some section of the external dock structure, replacing rot-damaged planking or reinforcing a mooring post weakened by current. The settlement is alive in the way that working places are alive â€' constant, purposeful, and entirely indifferent to aesthetic appreciation.</title><rect x="1508" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1568.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8352</text><text x="1568.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8353
Great River Gorge â€' Sea Falls Approach

The river's gradient increases perceptibly here as the Great River approaches the Sea Falls â€' the series of dramatic cascades that connect the Kailian and Apelian seas through the body of Oreka. The roar of the falls is audible from this rim road approach, carried upward and outward by the gorge acoustics. Portage trails bypass the falls entirely on both rim roads, and they are busy year-round with the goods that the Sea Falls make impossible to navigate.</title><rect x="1064" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1124.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8353</text><text x="1124.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8354
Great River Gorge â€' Sea Falls Overlook

The Sea Falls drop in three great cascades that fill the gorge with perpetual mist and a roar that makes normal conversation impossible. The water at the base of the falls boils and churns in a permanent white chaos before reorganizing into the calmer river that continues south. The mist produces a micro-climate of unusual coolness and humidity â€' plants grow on the cliff-faces here that would not survive fifty yards away in either direction.</title><rect x="1064" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1124.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8354</text><text x="1124.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8355
Great River Gorge â€' Portage Station (North)

The northern portage station at the Sea Falls is a Halfling and Pekakarlik operation that transfers cargo around the falls â€' too dangerous for navigation even by the most skilled boat pilots. The station has warehousing, draft animals, and specialized freight wagons for the overland bypass route. The portage fee is controlled by tradition rather than market pricing, a convention that has kept the route politically accessible to small traders and prevented monopolization.</title><rect x="324" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="384.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8355</text><text x="384.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8356
Great River Gorge â€' Portage Bypass Road

The portage bypass road makes a wide arc around the Sea Falls, its surface maintained to a standard that reflects the road's economic importance. Teams of draft animals pull loaded wagons continuously in both directions, and the traffic management at the pinch-points where the road narrows is handled by a system of alternating priority signals that the portage operators have refined over generations into something that almost never fails.</title><rect x="472" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8356</text><text x="532.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8357
Great River Gorge â€' Portage Station (South)

The southern portage station marks the end of the bypass and the beginning of navigable water again on the southern side of the Sea Falls. Cargo is reloaded here onto waiting boats for the journey south to the Apelian Sea. The station maintains a small hostel and a trading post where goods are sometimes sold before the southern leg of transport rather than carried further â€' the station's location makes it a secondary market for goods whose primary market is elsewhere.</title><rect x="620" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="680.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8357</text><text x="680.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8358
Great River Gorge â€' Canyon Pool

A natural widening of the gorge at a bend in the Great River has created a deep pool of calmer water where boats anchor to rest between the difficult current sections. The pool's walls show high-water marks from multiple flood seasons, and a Pekakarlik-maintained rescue station on a rock platform above the pool keeps ropes and flotation equipment ready. The pool is cold even in high summer, fed by current from the mountains.</title><rect x="1656" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8358</text><text x="1716.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8359
Great River Gorge â€' North Rim Trail

A narrow trail along the gorge's north rim connects the Kharazhad approach road to the portage bypass, providing a faster alternative to the switchback descent for travelers who do not need to use the river. The trail requires careful footing in several sections but is navigable without climbing equipment. Desert flora grows to the rim-edge, and the transition from desert ground-cover to the sudden void of the gorge is startling every time.</title><rect x="1508" y="324" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="342" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8359</text><text x="1568.0" y="386.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
<g><title>vnum 8360
Great River Gorge â€' Spring Flood High-Water Mark

A section of gorge wall where the spring flood tide has deposited a distinctive band of sediment at its maximum height â€' a visual record of the river's seasonal extremes. The Pekakarlik have been measuring and recording flood heights here for centuries, and the carved record on the wall face constitutes the longest continuous flood-data series in Oreka. Current flood heights are compared to this record by every generation of Flowkeepers as part of their maintenance planning.</title><rect x="2396" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2456.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 8360</text><text x="2456.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Great River Gorge â€…</text>
</g>
