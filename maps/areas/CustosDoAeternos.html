The western gate of Custos do Aeternos, built of dark basalt and reinforced with iron bands. This gate sees less traffic than the others -- the road west leads through increasingly wild terrain toward the coast and the Chainless Legion enclaves. Guards here are alert and cautious, as the western approaches are the least patrolled. Chainless Legion traders occasionally arrive through this gate, drawing wary glances.</title><rect x="916" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="976.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4108</text><text x="976.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">West Gate</text>
</g>
<g><title>vnum 4109
Grand Avenue

A magnificent boulevard stretching west from the chapel quarter toward the Crystal Spire -- the seat of the city's government. The avenue is the widest street in Custos, lined with ancient sky-oaks, crystal lampposts, and statues of the city's founders. Fountains play at regular intervals, and the pavement is polished marble that gleams in the Aetherial Veil's light.</title><rect x="768" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4109</text><text x="828.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Grand Avenue</text>
</g>
<g><title>vnum 4110
Civic Plaza

A great square where public gatherings, proclamations, and festivals are held. The plaza can hold ten thousand citizens and frequently does during the seasonal festivals that mark the elemental calendar. A raised dais at the western end serves as the Mayor's speaking platform, and crystal amplification spires carry her voice to every corner of the square.</title><rect x="620" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4110</text><text x="680.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Civic Plaza</text>
</g>
<g><title>vnum 4111
The Crystal Spire -- Ground Floor

The base of the Crystal Spire rises from a garden of wind-orchids and crystal formations. This is the administrative heart of Custos do Aeternos -- the Mayor's seat, the city council chamber, and the center of governance. The entrance hall is a soaring atrium of crystal and living wood, flooded with refracted light. Guards in ceremonial wind-silk stand watch, their polished crystal-tipped spears more decorative than functional.</title><rect x="472" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="532.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4111</text><text x="532.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Crystal Spire --…</text>

<g><title>vnum 4112
The Crystal Spire -- Mayor's Hall

The upper chamber of the Crystal Spire, where Mayor Caelith Windweaver conducts the business of governing Custos do Aeternos. The walls are transparent crystal offering a panoramic view of the city and the Aetherial Veil overhead. Caelith's illusionist's craft makes the room itself shift and respond to the mood of discussions. Maps, treaties, and a working model of the Veil's fluctuations occupy the central table.</title><rect x="28" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="88.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4112</text><text x="88.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Crystal Spire --…</text>
</g>
<g><title>vnum 4113
Court of Justice

A solemn building of white marble where the city's legal matters are heard. The court is feared and respected in equal measure. Three magistrates -- a Pasua, a Pekakarlik, and a human -- hear cases in rotation, ensuring no single racial perspective dominates.</title><rect x="620" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4113</text><text x="680.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Court of Justice</text>
</g>
<g><title>vnum 4114
City Watch Headquarters

The barracks and headquarters of the Custos City Watch. Guards -- mostly humans and Pekakarlik, with a sprinkling of Kovaka -- train in the courtyard, and the watch commander's office overlooks the Grand Avenue from a crystal-paned window. The Watch maintains close patrols and a strong presence throughout the city.</title><rect x="620" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4114</text><text x="680.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">City Watch Headquart…</text>
</g>
<g><title>vnum 4115
Hall of Records

A fireproof stone building where the city's official records are maintained -- birth registers, property deeds, guild charters, trade agreements, and the voluminous archives of civic governance stretching back to the city's founding. A staff of Pasua and human clerks maintain the records with meticulous care. Access is available to any citizen during business hours.</title><rect x="1212" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4115</text><text x="1272.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Hall of Records</text>
</g>
<g><title>vnum 4116
Tax Collector's Office

A sturdy, practical building where the city's revenues are collected and accounted. The tax collectors -- widely regarded as the least popular people in any city -- perform their duties with resigned competence. The office connects to the City Watch headquarters for obvious reasons. A reinforced vault in the basement holds the city's treasury.</title><rect x="472" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4116</text><text x="532.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Tax Collector's Office</text>
</g>
<g><title>vnum 4117
Embassy Row

A dignified street where the other settlements of the Twin Rivers maintain diplomatic offices. Greenford, Stoneharbor, Liraveth, and Aerithal all have permanent embassies here, staffed by diplomatic representatives who manage trade disputes, coordinate regional defense, and gossip with professional enthusiasm. The Chainless Legion recently opened a modest trade office at the end of the row, a development watched with interest by all parties.</title><rect x="472" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4117</text><text x="532.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Embassy Row</text>
</g>
<g><title>vnum 4118
The Golden Rose Chapter House

An elegant townhouse that serves as the Custos headquarters of the Golden Roses -- the continent-spanning organization devoted to detecting corruption and the Deceiver's Feat. The house's windows are curtained, its doors always locked, and its appearance is carefully nondescript. The Thorns stationed here specialize in monitoring the city for signs of deception and the telltale 'holes' that mark a Cut String.</title><rect x="620" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4118</text><text x="680.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Golden Rose Chap…</text>
</g>
<g><title>vnum 4119
The Veil Observatory

A rooftop platform atop the highest building on Grand Avenue, fitted with crystal lenses and magical instruments focused on the Aetherial Veil. From here, scholars and mages monitor the Veil's health -- a task that has become increasingly urgent as the barrier's fluctuations grow more frequent. The view encompasses the entire city beneath the shimmering dome, and on bad days, the gaps in the Veil are visible as dark patches against the sky.</title><rect x="620" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4119</text><text x="680.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Veil Observatory</text>
</g>
<g><title>vnum 4120
West Road Junction

The road west from the city leads through rolling hills toward the coast and the Chainless Legion enclaves. The terrain is wilder here, and the trade road is less maintained than the great highways. Milestones mark the distance to Clifftide, Saltrest Haven, and Redcurrent Strand, though few travelers make the full journey.</title><rect x="324" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="384.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4120</text><text x="384.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">West Road Junction</text>
</g>
<g><title>vnum 4121
Oroas Street North

The storied avenue continues north from the chapel quarter, its ancient oaks casting deep shadows across cobblestones worn smooth by centuries of use. Monuments to the city's history line the way -- a cairn marking where the first Hasura raised a crystal spire, a relief showing the Aetherial Veil's creation, a bronze plaque recording the founding compact between the elven subraces.</title><rect x="1064" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1124.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4121</text><text x="1124.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Oroas Street North</text>
</g>
<g><title>vnum 4122
Old Quarter Square

The oldest part of Custos do Aeternos, where the city's original buildings still stand. The architecture here predates the current crystal-spire style -- these are buildings of living wood and hand-shaped stone, their organic forms a reminder that the city began as an elven settlement in the deep forest. A great sky-oak stands at the square's center, its trunk wider than a house, its canopy sheltering the entire plaza.</title><rect x="1064" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1124.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4122</text><text x="1124.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Old Quarter Square</text>
</g>
<g><title>vnum 4123
Pasua Cultural Hall

A graceful building of carved living-wood where the Pasua Elves -- the city's cultural dominant -- maintain their traditions. Inside, storytellers practice their art, diplomats refine their craft, and the archives of Pasua oral history are maintained in both written and performed form. The Hall hosts public storytelling evenings that draw audiences of all races, Pasua charm making the tales feel like shared memories.</title><rect x="1064" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1124.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4123</text><text x="1124.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Pasua Cultural Hall</text>
</g>
<g><title>vnum 4124
Hasura Lightweaver's Studio

An airy, light-filled studio where a master Hasura lightweaver demonstrates and teaches the art of lightweaving -- the manipulation of light into art, illusion, and architectural enhancement. The studio's walls shift through a cycle of scenes: forests at dawn, rivers at sunset, star-fields at midnight. The art form is central to Hasura identity, and this studio preserves techniques dating to the city's founding.</title><rect x="1212" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4124</text><text x="1272.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Hasura Lightweaver's…</text>
</g>
<g><title>vnum 4125
Heritage Walk

A covered passage decorated with murals depicting the history of Custos do Aeternos, from its founding by Hasura Elves to the present day. The murals are enhanced with Hasura lightweaving, making them seem to move and breathe. Key scenes include the raising of the first crystal spire, the anchoring of the Aetherial Veil, and the arrival of the Pekakarlik Dwarves who would build the city's water infrastructure.</title><rect x="1212" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1272.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4125</text><text x="1272.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Heritage Walk</text>
</g>
<g><title>vnum 4126
Elders' Garden

A serene garden maintained by the city's eldest residents -- elves who remember the Deceivers' War not as history but as lived experience. Ancient trees and carefully tended flowers create a space of profound peace.</title><rect x="1360" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1420.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4126</text><text x="1420.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Elders' Garden</text>
</g>
<g><title>vnum 4127
The Ancestor Oak

The oldest living tree in Custos do Aeternos -- a sky-oak planted by the Giants themselves during the age of Thalorien, before the city existed. The tree is enormous, its trunk carved with runes in a language no living Kin can read. The Circle of Deeproot maintains a permanent warden here. The oak is sacred to all four elemental traditions.</title><rect x="1360" y="472" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1420.0" y="490" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4127</text><text x="1420.0" y="534.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Ancestor Oak</text>
</g>
<g><title>vnum 4128
Cinvarin Vigil Ground

An open field where the Circle of Deeproot holds its seasonal vigils -- silent ceremonies honoring the Five Witnesses and monitoring the elemental health of the land. The ground is bare earth, kept deliberately unworked, and at the center stands a simple stone altar surrounded by five unlit torches. During vigils, the torches burn with elemental fire and the druids' awareness extends across the entire city.</title><rect x="1508" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1568.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4128</text><text x="1568.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Cinvarin Vigil Ground</text>
</g>
<g><title>vnum 4129
Circle of Deeproot Waystation

A modest stone building where visiting druids of the Circle of Deeproot find lodging and share reports. Deep Markers -- rune-carved stones used as elemental monitoring stations -- are stored, maintained, and deployed from here. A rotating staff of Wardens mans the waystation, and their assessment of the city's elemental health is forwarded to the Rootmoot's seasonal meetings.</title><rect x="1508" y="472" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1568.0" y="490" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4129</text><text x="1568.0" y="534.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Circle of Deeproot W…</text>
</g>
<g><title>vnum 4130
North Road

A well-maintained road leading north from the city through open parkland before entering the forest that gives way to the Windweave Glade. The road is the primary route to the canopy cities -- Liraveth, Aerithal, and Sylarien -- and sees steady traffic of travelers, traders, and diplomatic envoys. The trees along the roadside grow taller and older as the Glade approaches.</title><rect x="1508" y="324" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="342" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4130</text><text x="1568.0" y="386.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">North Road</text>
</g>
<g><title>vnum 4131
Oroas Gate (North Gate)

The great North Gate of Custos do Aeternos, the most ancient and ornate of the city's gates. Carved from a single massive crystal-veined boulder by the city's Hasura founders, the gate depicts scenes of the Windweave Glade in exquisite detail -- sky-oaks, wind-spirits, and the distant canopy cities barely visible among the branches. A warm breeze funnels through the gate's arch, and passing through feels like stepping into a gentle current of air.</title><rect x="1508" y="176" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="194" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4131</text><text x="1568.0" y="238.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Oroas Gate (North Ga…</text>
</g>
<g><title>vnum 4132
Northern Guardhouse

A fortified watchtower adjacent to Oroas Gate, staffed by the city's best scouts and rangers. The guard here monitors not just mundane threats but elemental anomalies in the forest approaches -- a responsibility shared with the Circle of Deeproot. The tower's upper platform offers a commanding view north along the Glade road, and on clear days, the canopy cities are visible as glittering specks among the treetops.</title><rect x="1508" y="28" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="46" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4132</text><text x="1568.0" y="90.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Northern Guardhouse</text>
</g>
<g><title>vnum 4133
Dodger Street North

The narrow lane continues northeast from the chapel quarter, growing darker and more cramped with each step. The crystal lampposts here are cracked or missing, and the buildings lean together overhead as if sharing secrets.</title><rect x="1360" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4133</text><text x="1420.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dodger Street North</text>
</g>
<g><title>vnum 4134
Dodger's Square

A small, shadowy plaza that serves as the unofficial heart of the city's rougher element. The cobblestones are uneven, the fountain has not worked in years, and the surrounding buildings sport boarded windows and reinforced doors. Despite appearances, the square is busy -- just not with the kind of business that welcomes scrutiny. Street vendors sell hot food, cheap ale, and information, the last being the most expensive.</title><rect x="1360" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4134</text><text x="1420.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dodger's Square</text>
</g>
<g><title>vnum 4135
The Crooked Stair

A tall, narrow building of suspect structural integrity that serves as a flophouse, gambling den, and meeting place for those who prefer to conduct business away from the City Watch's patrols. The stairs are indeed crooked, and the rooms are tiny, but the prices are low and questions are not asked. The proprietor, a scarred human of indeterminate age, has the uncanny ability to be looking the other way at exactly the right moment.</title><rect x="1360" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4135</text><text x="1420.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Crooked Stair</text>
</g>
<g><title>vnum 4136
Pickpocket's Alley

A twisting, narrow alley that locals advise visitors to avoid -- advice that is frequently ignored by the adventurous and regretted by the careless. The alley is suspiciously busy for its width, and the foot traffic moves with a practiced, jostling rhythm that provides excellent cover for light-fingered professionals. A few legitimate shops provide thin cover for the alley's true commerce.</title><rect x="1508" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4136</text><text x="1568.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Pickpocket's Alley</text>
</g>
<g><title>vnum 4137
The Blind Eye Tavern

A dingy tavern with blackened windows and a reputation for discretion. The ale is surprisingly good -- the owner's one concession to quality -- and the clientele ranges from petty criminals to information brokers to off-duty guards who prefer to drink where their colleagues will not see them. A back room is available for private meetings, no questions asked, for the price of a bottle.</title><rect x="1508" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4137</text><text x="1568.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Blind Eye Tavern</text>
</g>
<g><title>vnum 4138
Fence's Row

A short street where second-hand goods of questionable provenance change hands. The shops are small, cramped, and dimly lit, and the proprietors share a talent for not knowing where their merchandise came from. Identity verification is pointedly not practiced here -- a cultural blind spot that the City Watch finds endlessly frustrating. The goods range from mundane household items to the occasional magical trinket that someone is very eager to sell quickly.</title><rect x="1508" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4138</text><text x="1568.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Fence's Row</text>
</g>
<g><title>vnum 4139
The Whisper Market

A cellar market accessible through an unmarked door in Fence's Row. Below street level, vendors sell restricted goods -- poisons, lock-picks, forged documents, and information about guard patrol routes. The market operates on a rotating schedule known only to regulars, and the entrance changes location periodically. The Unstrung maintain a quiet oversight of the Whisper Market without openly controlling it.</title><rect x="1804" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1864.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4139</text><text x="1864.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Whisper Market</text>
</g>
<g><title>vnum 4140
Rat Run

A network of narrow passages between and behind the buildings of Dodger's Row, used as escape routes, shortcuts, and meeting places by those who need to move through the quarter unseen. The passages are too narrow for anyone in armor, deliberately maintained that way. Local children use the Rat Run as a playground; local criminals use it as infrastructure.</title><rect x="1804" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1864.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4140</text><text x="1864.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Rat Run</text>
</g>
<g><title>vnum 4141
The Cutpurse's Loft

A rooftop garret above the Rat Run, accessible only by a concealed ladder. From here, the city's criminal element maintains a lookout over Dodger's Row and the approaches from the City Watch headquarters. The loft offers excellent views of the Grand Avenue district and the North Gate approaches. Its current occupant is unknown to the City Watch, which frustrates them enormously.</title><rect x="1952" y="620" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="638" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4141</text><text x="2012.0" y="682.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Cutpurse's Loft</text>
</g>
<g><title>vnum 4142
Safe House

A nondescript building in the heart of Dodger's Row with a reinforced door and no windows on the ground floor. Inside, a hidden cellar provides temporary refuge for those who need to disappear -- debtors, fugitives, and the occasional political refugee. The safe house has changed hands many times, and its current operators maintain careful neutrality among the quarter's competing interests.</title><rect x="472" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4142</text><text x="532.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Safe House</text>
<text x="532.0" y="1028" text-anchor="middle" fill="#6a84a8" font-size="10">down→4210</text>
</g>
<g><title>vnum 4143
Back Alley Shrine

A tiny, hidden shrine in a dead-end alley, its altar barely large enough for a candle and a prayer. No god's name is inscribed, but the offerings -- wilted flowers, tear-stained letters, and small hand-shaped tokens -- suggest a mix of Semyon's and the Hand Unanswered's suppliants. The desperate come here when the grand temples feel too public, and the shrine's anonymity is its most sacred quality.</title><rect x="1952" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2012.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4143</text><text x="2012.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Back Alley Shrine</text>
</g>
<g><title>vnum 4144
Dodger's Gate (Postern)

A small, poorly maintained postern gate in the city wall that technically should be locked at night but somehow never is. The gate opens onto a muddy path that winds around the city's northeast wall and eventually connects to the North Road. The City Watch has sealed this gate seven times; it has been quietly reopened eight times.</title><rect x="1656" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4144</text><text x="1716.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dodger's Gate (Poste…</text>
<text x="1716.0" y="1324" text-anchor="middle" fill="#6a84a8" font-size="10">down→4220</text>
</g>
<g><title>vnum 4145
Crystal Promenade (East)

A beautiful walkway along the eastern edge of the city, offering views of the crystal spires against the sky. The promenade connects the Temple District to the Mystic Quarter, running along the inside of the city wall. Benches of crystal-veined stone invite rest, and the refracted light of the Aetherial Veil plays across every surface.</title><rect x="28" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="88.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4145</text><text x="88.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Crystal Promenade (E…</text>
</g>
<g><title>vnum 4146
Riverside Walk (South)

A cobbled path following the Great River's north bank between the River District and the Dock District. Willows trail their branches in the current, and small pleasure boats are tied at intervals. The walk is popular with couples at sunset, when the Aetherial Veil's light turns the river to molten gold.</title><rect x="768" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4146</text><text x="828.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Riverside Walk (South)</text>
</g>
<g><title>vnum 4147
Northern Lane

A residential street connecting the Scholar's District and the Oroas Gate District along the city's northern edge. The houses here are old and comfortable, belonging to established families -- professors, retired guildmasters, and clergy. The street is quiet, leafy, and pleasant, a world away from Dodger's Row just to the east.</title><rect x="916" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4147</text><text x="976.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Northern Lane</text>
</g>
<g><title>vnum 4148
Western Approach

A broad street connecting the Guild District to the Forge Quarter along the city's western side. The transition from the guildhalls' banners to the forge quarter's smoke and heat is gradual, and the street serves as a buffer zone where both communities mingle. Small shops serving both districts line the way.</title><rect x="1508" y="2692" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="2710" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4148</text><text x="1568.0" y="2754.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Western Approach</text>
</g>
<g><title>vnum 4149
Artisan-River Passage

A quiet lane connecting the Artisan Quarter to the River District, running along the southwestern city wall. Artisans whose work requires river-clay, water, or the particular light of the river terrace use this lane daily. The passage is narrow but well-maintained, and window boxes of river-herbs soften the stone walls.</title><rect x="1212" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1272.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4149</text><text x="1272.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Artisan-River Passage</text>
</g>
<g><title>vnum 4150
Market-Scholar Bridge

An elegant covered bridge spanning a small ravine between the Market District and the Scholar's District. Booksellers have set up stalls on the bridge itself, creating a permanent market for academic texts. The bridge is a popular meeting spot where the commercial energy of the market meets the intellectual energy of the academy.</title><rect x="1508" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4150</text><text x="1568.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Market-Scholar Bridge</text>
</g>
<g><title>vnum 4151
Sunset Terrace

A broad terrace overlooking the western approaches to the city, offering spectacular views of sunsets over the distant coast. The terrace connects the Grand Avenue district to the Forge Quarter and serves as a popular gathering spot in the evenings. Street musicians -- mostly Pasua bards -- perform here at dusk.</title><rect x="768" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="828.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4151</text><text x="828.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sunset Terrace</text>
</g>
<g><title>vnum 4152
Pekakarlik Canal Walk

An underground passage following one of the aqueduct channels that the Pekakarlik Dwarves maintain beneath the city. Lit by luminescent river-moss, the passage connects the Waterfolk Quarter to the Dock District and serves as both infrastructure access and dwarf-height shortcut. The sound of rushing water echoes from the stone walls.</title><rect x="1212" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4152</text><text x="1272.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Pekakarlik Canal Walk</text>
<text x="1272.0" y="1916" text-anchor="middle" fill="#6a84a8" font-size="10">down→4205</text>
</g>
<g><title>vnum 4153
The Promenade of Winds

An elevated walkway near the top of the city's northern wall, where the wind blows strongest and the Aetherial Veil's shimmer is close enough to almost touch. The walkway connects the Mystic Quarter to the Scholar's District and is a favorite of Na'wasua Elves who seek the combination of wind and starlight. On stormy nights, wind-spirits are sometimes visible from here as flickering blue lights.</title><rect x="324" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4153</text><text x="384.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Promenade of Winds</text>
</g>
<g><title>vnum 4154
Cinvarin Way

A processional road connecting the Temple District to the Oroas Gate District, used for religious festivals and seasonal processions. The road is lined with the symbols of all four elements and the sigils of the Ascended Gods. During the Festival of the Five Names, the entire road is lit with elemental fire and thousands of Kin walk in silent vigil.</title><rect x="1508" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4154</text><text x="1568.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Cinvarin Way</text>
</g>
<g><title>vnum 4155
Guild-Market Passage

A covered walkway connecting the Guild District to the Market District, allowing guild members to reach the market without crossing the main streets. The passage is lined with notice boards displaying guild announcements, apprenticeship postings, and trade opportunities.</title><rect x="2248" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2308.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4155</text><text x="2308.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Guild-Market Passage</text>
</g>
<g><title>vnum 4156
South Wall Walk

A patrol path along the top of the southern city wall, connecting the South Gate to the East River Gate. Guards walk this route hourly, and the views of the Great River and the road to Greenford are commanding. Arrow slits and signal-fire platforms are spaced at regular intervals.</title><rect x="176" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="236.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4156</text><text x="236.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">South Wall Walk</text>
</g>
<g><title>vnum 4157
Dodger-Scholar Alley

A narrow, unofficial passage connecting the respectable Scholar's District to the disreputable Dodger's Row. Students use this alley to visit the cheaper taverns and more exciting entertainments of the Row; criminals use it to case the wealthier district. Both groups pretend the other does not exist.</title><rect x="324" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="384.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4157</text><text x="384.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dodger-Scholar Alley</text>
</g>
<g><title>vnum 4158
Festival Grounds

An open field south of Civic Plaza used for the city's largest festivals, fairs, and public celebrations. During the seasonal elemental festivals, the grounds are transformed with temporary stages, food stalls, and magical displays. Between festivals, the grounds serve as a public park and occasional military drill field.</title><rect x="472" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="532.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4158</text><text x="532.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Festival Grounds</text>
</g>
<g><title>vnum 4159
The Windharps

A terrace at the northeastern edge of the city where crystal spires of varying heights have been tuned to catch the wind, producing haunting, ever-changing music. The installation was created by a collaboration between Hasura lightweavers, Pasua musicians, and Pekakarlik stone-cutters, and represents the cross-cultural creativity that defines Custos do Aeternos. Visitors often sit for hours, mesmerized by the sound.</title><rect x="324" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4159</text><text x="384.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Windharps</text>
</g>
<g><title>vnum 4160
River Garden

A terraced garden descending from the Artisan Quarter toward the river, where water features and botanical displays create a peaceful retreat. Pekakarlik hydraulic engineering keeps the fountains running, and Hasura lightweavers have enchanted the garden to glow softly at night. The garden connects the Artisan Quarter to the southern river path.</title><rect x="768" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="828.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4160</text><text x="828.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">River Garden</text>
</g>
<g><title>vnum 4161
The Donation Vault

A cool, dry cellar beneath Artisan Square, maintained by the city for the benefit of all adventurers. Sturdy shelves line the walls, and a large stone chest sits in the center. Travelers leave gear they no longer need here for those who do. A brass plaque on the wall reads: Use 'drop &lt;item>' to leave something for others, and 'get &lt;item>' to take what you need. Take only what you will use -- the gods are watching.</title><rect x="324" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4161</text><text x="384.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Donation Vault</text>
</g>
<g><title>vnum 4200
Under the Deepwell Tavern

The old service well beneath the Deepwell Tavern opens into a low stone chamber that smells of spilled beer turned sour and wet rot. An iron ladder climbs back up to the tavern floor overhead, its lowest rungs orange with rust. Fragments of broken crockery litter the packed-earth floor, and a curved tunnel leads east along the old drain line.</title><rect x="472" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4200</text><text x="532.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Under the Deepwell T…</text>
</g>
<g><title>vnum 4201
Sewer Main -- Market Branch

This broad brick-lined passage carries the runoff from the market district above. A trickle of grey water runs along a central channel, and the air is thick with the smell of rotting vegetables and old blood from the butchers' stalls. Side drains open east and south; a collapsed section blocks the way further west.</title><rect x="620" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4201</text><text x="680.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sewer Main -- Market…</text>
</g>
<g><title>vnum 4202
Sewer Grate -- Sludge Pool

The brick vault opens over a pool of slow-moving sludge fed by three lesser drains. Pale streamers of mold hang from the ceiling and trail into the water. An iron grate above admits a single pencil of daylight -- it illuminates very little. The pool can be waded across, but the footing is treacherous.</title><rect x="768" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="828.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4202</text><text x="828.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sewer Grate -- Sludg…</text>
</g>
<g><title>vnum 4203
The Rat's Den

What was once a collapsed cellar has become a warren. Piles of shredded burlap, gnawed bone, and stolen trinkets ring the walls, and the floor is a carpet of matted fur and droppings. The occupants scatter and regroup as intruders enter, their red eyes glinting in the torchlight.</title><rect x="916" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="976.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4203</text><text x="976.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Rat's Den</text>
</g>
<g><title>vnum 4204
Collapsed Drain

A cave-in years ago brought the far wall down into the sewer, and the resulting slope of broken brick and mud has never been cleared. A chill draft rises through the gap, smelling of wet stone and something older -- the mineral scent of deeper tunnels. A rough scramble down the rubble leads into the old cisterns.</title><rect x="1064" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1124.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4204</text><text x="1124.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Collapsed Drain</text>
</g>
<g><title>vnum 4205
Canal Grate Chamber

A heavy iron grate above pours a steady silver curtain of canal water into this small stone chamber, which drains through a vent on the far wall. The noise is a constant hiss. A rusted ladder climbs up through the grate to the Pekakarlik Canal Walk overhead; a passage leads north into older, drier brickwork.</title><rect x="1212" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4205</text><text x="1272.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Canal Grate Chamber</text>
</g>
<g><title>vnum 4206
The Stirge Nest

The brick ceiling here is crazed with cracks, and mossy growths hang from them in long curtains. Small leathery shapes cling to the vault overhead, their proboscises twitching at the scent of warm blood. The smell of ammonia is overpowering.</title><rect x="1360" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4206</text><text x="1420.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Stirge Nest</text>
</g>
<g><title>vnum 4207
The Alpha's Midden

The sewer widens into a crude throne-chamber for something very large and very aggressive. Piled against the walls are the remains of dozens of meals: chewed leather boots, split bones, a broken shortsword still clutched in a gnawed hand. The master of this place is clearly in residence, and clearly not pleased.</title><rect x="1508" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4207</text><text x="1568.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Alpha's Midden</text>
</g>
<g><title>vnum 4208
Cistern Overflow

The sewer brickwork abruptly gives way to much older stonework -- great rough-hewn blocks laid without mortar, slick with centuries of wet. This is one of the old Custos cisterns, built before the city reached its current size. Water laps softly somewhere ahead.</title><rect x="1656" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4208</text><text x="1716.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Cistern Overflow</text>
</g>
<g><title>vnum 4209
Flooded Cistern

Black water fills most of this circular chamber to knee depth, still as glass. Bloated shapes stir beneath the surface as you step in -- the dead of older centuries, preserved cold and wet and hungry. Something in this water remembers that it was once a person, and is furious about what it has become.</title><rect x="1804" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4209</text><text x="1864.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Flooded Cistern</text>
</g>
<g><title>vnum 4210
Under the Safe House

A rotten trapdoor overhead opens into a stone-lined cell no larger than a closet. A stub of candle on an iron shelf has been lit recently; beside it is a note in a crabbed hand that reads 'Lie still until dawn.' The cell opens west into older, colder stone.</title><rect x="1952" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4210</text><text x="2012.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Under the Safe House</text>
</g>
<g><title>vnum 4211
The Broken Arch

A grand arch once stood here, connecting the cisterns to something older still. Today it is reduced to a jagged semicircle of broken stone around a dark opening. A skeletal figure sits propped beside the arch in the pose of a bored sentry, and it has been sitting there a very long time. As you approach, it stands.</title><rect x="2100" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2160.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4211</text><text x="2160.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Broken Arch</text>
</g>
<g><title>vnum 4212
Fetid Pool

A dead cistern. The water here has been still so long that it has grown a skin of reddish-brown mold, and the smell rising from it is a clinging, sickly sweetness that coats the tongue. The mold is cold -- unnaturally so -- and draws warmth from everything that comes near.</title><rect x="2248" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2308.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4212</text><text x="2308.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Fetid Pool</text>
</g>
<g><title>vnum 4213
The Necromancer's Scratch

Someone once practiced dark arts in this low-ceilinged cell, and the walls still show their work: scratched sigils in long repeating spirals, some rubbed smooth by centuries of passing bodies. The stone floor is dark with old blood. The present tenant eats what wanders in, and has been doing so for a long time.</title><rect x="2396" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2456.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4213</text><text x="2456.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Necromancer's Sc…</text>
</g>
<g><title>vnum 4214
Drowned Stair

A stone staircase descends into standing water; its lower steps vanish into blackness. The water is colder than any in the cisterns above, and the echoes that come back sound like they travel a long way. A dry upper landing connects east to Pekakarlik work -- tighter cut stone, different craft entirely.</title><rect x="2544" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2604.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4214</text><text x="2604.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Drowned Stair</text>
</g>
<g><title>vnum 4215
The Vault Breach

A section of the Donation Vault's north wall has collapsed inward, revealing a tunnel dressed in the distinctive close-cut stonework of Pekakarlik work -- blocks fitted so tightly that no mortar was needed. The passage predates the vault above by centuries. Faint hammering sounds in the distance, from something that does not sleep.</title><rect x="2692" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2752.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4215</text><text x="2752.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Vault Breach</text>
</g>
<g><title>vnum 4216
Tunnel Junction

The Pekakarlik tunnel forks here into three branches, each marked by a carved rune in the corner of the jamb. Scratched over the runes in more recent charcoal are the crude tally-marks of kobold scouts, and a faint reek of lamp oil and unwashed fur drifts from the east branch.</title><rect x="2840" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2900.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4216</text><text x="2900.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Tunnel Junction</text>
</g>
<g><title>vnum 4217
Kobold Warren -- East

The Pekakarlik passage has been crudely expanded sideways to accommodate a squatter colony. Cook-fire ash blackens the ceiling, bundles of filthy blankets line the walls, and small yellow-eyed figures chitter and scramble for weapons at the sight of intruders. The floor is slick with spilled grease.</title><rect x="2988" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3048.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4217</text><text x="3048.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Kobold Warren -- East</text>
</g>
<g><title>vnum 4218
Kobold Warren -- West

A smaller chamber filled with the Warren's stores of stolen goods: tavern knives, dropped coin-purses cut open and drained, a half-finished wooden fetish of Tiamat carved with more enthusiasm than skill. The lone occupant crouches between the piles, guarding his hoard with furious little squeals.</title><rect x="3136" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3196.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4218</text><text x="3196.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Kobold Warren -- West</text>
</g>
<g><title>vnum 4219
The Quarry Shaft

The Pekakarlik tunnel widens here into a true quarry-shaft, its walls shaped into patient terraces that climb beyond the reach of any torch. A low crust of dust covers everything. At the base of the shaft, a lump of patient earth resolves itself -- as you watch -- into a shape with arms and attention.</title><rect x="3284" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3344.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4219</text><text x="3344.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Quarry Shaft</text>
</g>
<g><title>vnum 4220
The Postern Shaft

A knotted rope of the finest dwarven silk drops from a shaft in the ceiling -- the thieves' route down from Dodger's Gate. Shallow-cut handholds flank the rope for those who distrust knotted silk. The shaft rises into a lightless square far above; a low passage leads west into the maintenance tunnels proper.</title><rect x="3432" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3492.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4220</text><text x="3492.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Postern Shaft</text>
</g>
<g><title>vnum 4221
Hall of the Quarry-Golem

A dressed-stone hall with columns shaped like kneeling figures. One column has moved since the hall was built: the sixth from the door stands closer to the center than the others, and its shaped arms hang at slightly different angles. The dust on its shoulders looks freshly disturbed.</title><rect x="3580" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3640.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4221</text><text x="3640.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Hall of the Quarry-G…</text>
</g>
<g><title>vnum 4222
Forge-Ward Passage

A narrow maintenance passage with a low vaulted ceiling, its walls scorched black by the Pekakarlik foundries it once served. The heat is long gone; what remains is cold soot and the smell of old iron. Thick grey webs span the corners -- something patient lives here, and is not pleased to share.</title><rect x="3728" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3788.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4222</text><text x="3788.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Forge-Ward Passage</text>
</g>
<g><title>vnum 4223
The Outer Vault Hall

A grand hall of careful Pekakarlik stonework, lit only by a faint phosphoric glow from runes set into the capstones. The columns here are shaped like axe-heads pointing downward -- the old clan-seal of the tunnel-stewards. At the far end, a stone doorway has been sealed and then forced open again. Webs thick as cord sway in the still air.</title><rect x="3876" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="3936.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4223</text><text x="3936.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Outer Vault Hall</text>
</g>
<g><title>vnum 4224
Pekakarlik Archive Chamber

A long gallery lined with slate tablets set into the walls, each incised in the block-script the Pekakarlik used for maintenance records. The tablets detail pump-schedules, cistern depths, and the genealogies of the minor stewards who kept the undercity running. None of it is secret, but all of it is centuries old.</title><rect x="4024" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4084.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4224</text><text x="4084.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Pekakarlik Archive C…</text>
</g>
<g><title>vnum 4225
The Gel-Cube Chamber

A square room whose floor is worn glassy-smooth in a perfect track along the walls -- something large and slow has been patrolling this chamber for a very long time. Bones lie in three tidy heaps in the corners, their marrow scooped clean. The air tastes faintly of acid.</title><rect x="4172" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4232.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4225</text><text x="4232.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Gel-Cube Chamber</text>
</g>
<g><title>vnum 4226
The Tinker's Workshop

A small study that has not been swept since its owner died. A workbench holds tools laid out neat, each in its outline of accumulated dust. The craftsman's successor still fusses about the shop -- a small leathery creature with bat-like wings, which eyes you with something between resentment and recognition.</title><rect x="4320" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4380.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4226</text><text x="4380.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Tinker's Workshop</text>
</g>
<g><title>vnum 4227
The Treasure Cache

A small strongroom, its door long since forced. Most of what was here has been taken over the centuries, but the thieves in their haste left items that were too heavy, too ugly, or too carefully locked. A Pekakarlik strongbox sits in the corner, its hinges stubborn with rust but still workable. The air smells of iron and old leather.</title><rect x="4468" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4528.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4227</text><text x="4528.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Treasure Cache</text>
</g>
<g><title>vnum 4228
The Tunnel-Warden's Hall

A broad stone hall built for ceremony, with a dais at the far end and a stone chair carved in the shape of an overturned anvil. Seated on the chair is the Warden: a Pekakarlik kept alive far past his time by the slow magic of the runes around him. His eyes open as you enter, and they are the eyes of something that has forgotten it ever was kind.</title><rect x="4616" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4676.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4228</text><text x="4676.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Tunnel-Warden's …</text>
</g>
<g><title>vnum 4229
Deep Pipe Terminus

A dead-end chamber where three great stone pipes debouche into a pool of dark, motionless water. The water is deeper than it appears; divers have vanished here, and not come back. Something about the sound of dripping in this place feels more like a conversation than an accident.</title><rect x="4764" y="3284" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="4824.0" y="3302" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4229</text><text x="4824.0" y="3346.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Deep Pipe Terminus</text>
</g>
<g><title>vnum 4300
Shrine Skiff Landing

The priests of Semyon keep a flat-bottomed skiff tied at the eastern quay of the Dockside Shrine. A gravel path leads up from the water to the shrine's side door. The current here curls strangely against the bank, as if something upstream is bending the river's will. The priestess says she will pay for answers.</title><rect x="1656" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4300</text><text x="1716.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Shrine Skiff Landing</text>
</g>
<g><title>vnum 4301
Reed Shallows -- Eastern Flats

The Great River slows here into a maze of reed-choked channels where the dredgers never reach. The water is tea-colored with tannin and barely knee-deep, but the mud beneath it is soft and treacherous. Small dark shapes glide through the reeds, and bubbles rise where larger things wait.</title><rect x="1804" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4301</text><text x="1864.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Reed Shallows -- Eas…</text>
</g>
<g><title>vnum 4302
Muddywake Bend

The river swings into a slow bend here, leaving a wide crescent of wet mudflat before it. A fallen willow half-bridges the water, its trailing branches thick with skulking green things. The stench is that of a healthy swamp -- rich, alive, and actively rotting in three different directions at once.</title><rect x="472" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4302</text><text x="532.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Muddywake Bend</text>
</g>
<g><title>vnum 4303
Reed-Hidden Sandbar

Tall reeds screen a narrow sandbar from the shore, creating a natural blind. The sand is tracked with webbed footprints, all coming in, none going out. A pile of fish-bones, picked very clean, sits at the water's edge -- and a few of the bones are not fish.</title><rect x="1804" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4303</text><text x="1864.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Reed-Hidden Sandbar</text>
</g>
<g><title>vnum 4304
Half-Sunken Shrine Approach

The reeds thin as the ground rises, revealing the tops of three weathered stone pillars that once flanked a shrine-path. The shrine itself lies north, mostly submerged now where the river has broken through its old foundations. A carving of Semyon's river-crown still faces downstream in silent benediction.</title><rect x="1804" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4304</text><text x="1864.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Half-Sunken Shrine A…</text>
</g>
<g><title>vnum 4305
Sunken Shrine -- Steps

Mossy stone steps descend into clear shallow water where once they climbed to the shrine porch. The river has claimed the lower third of the building. A slim figure sits on the submerged middle step, combing out her long green hair, and her smile at your approach is not entirely reassuring.</title><rect x="1804" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4305</text><text x="1864.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sunken Shrine -- Steps</text>
</g>
<g><title>vnum 4306
Sunken Shrine -- Inner Porch

The interior of the old shrine is dim and half-flooded, lit only by light filtering through broken roof-tiles. River-worn floor-mosaics show Semyon in her aspect as Lady of the Shallows. Where the tiles are missing, the water is deep and very cold -- it gets colder further in.</title><rect x="1804" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4306</text><text x="1864.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sunken Shrine -- Inn…</text>
</g>
<g><title>vnum 4307
Sunken Shrine -- Altar Chamber

The shrine's altar is still standing, though the idol that once rested on it has fallen and cracked. The water is chest-deep here and moves gently in patterns that have nothing to do with the river current outside. A small pale creature circles the altar like a swimmer doing patient laps.</title><rect x="1804" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4307</text><text x="1864.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sunken Shrine -- Alt…</text>
</g>
<g><title>vnum 4308
The Old Weir Approach

The river widens into a shallow plate where the old weir once regulated flow. The weir itself is broken in two places, but its surviving stones form a natural crossing to an islet of higher ground. The water boils suspiciously around one of the gaps -- something is lodged there.</title><rect x="620" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4308</text><text x="680.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Old Weir Approach</text>
</g>
<g><title>vnum 4309
Stone Weir Passage

A narrow walk along the surviving weir stones, wet and slippery. To either side the river drops into pools deep enough to hide a wagon. Something large has been digging -- or living -- beneath the stones on the north side; there are drag-marks in the silt where the current is weakest.</title><rect x="1656" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4309</text><text x="1716.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Stone Weir Passage</text>
</g>
<g><title>vnum 4310
Weir Channel

A secondary channel below the broken weir carries most of the current when the river is high. A merfolk warrior waits here with a bone-tipped spear, watching the crossing with the hostile patience of a toll-keeper who has decided the toll will be blood. The water swirls dark behind him.</title><rect x="620" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="680.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4310</text><text x="680.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Weir Channel</text>
</g>
<g><title>vnum 4311
Flooded Grotto Mouth

The river forms a quiet pool at the foot of a limestone bluff whose face has been opened by erosion into a dark cavern mouth. The air coming out is cold and smells of minerals and deep water. A soft, almost musical sound echoes from within -- the voice of something old and patient speaking in the language of currents.</title><rect x="1804" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4311</text><text x="1864.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Flooded Grotto Mouth</text>
</g>
<g><title>vnum 4312
Lantern Pool

The grotto opens into a broad water-chamber lit by a single shaft of daylight that falls through a crack far above. The pool is fifteen feet across and fathoms deep. The walls are slick with carbonate and webbed with root-systems of whatever grows on the bluff above. The singing is louder here.</title><rect x="1952" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4312</text><text x="2012.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Lantern Pool</text>
</g>
<g><title>vnum 4313
Grotto -- The Deep Chamber

The grotto ends in a domed chamber whose pool is deeper than its diameter -- the water drops straight down into the river's old bed. The surface of the pool is not still; it is shaping itself into a broad, humanoid figure of moving water whose attention has just turned fully upon you. This is what is angry.</title><rect x="2100" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2160.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4313</text><text x="2160.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Grotto -- The Deep C…</text>
</g>
<g><title>vnum 4314
Grotto -- Side Cache

A narrow side-gallery dry enough to kneel in. Whoever last came here stashed their takings carefully under a ledge -- a small leather satchel, perhaps the work of a diver from long ago who never came back up. The satchel's contents have weathered the years better than the satchel itself.</title><rect x="1952" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4314</text><text x="2012.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Grotto -- Side Cache</text>
</g>
<g><title>vnum 4315
Upriver Gate

A small stone landing marks the east-bank approach the River-Gate guards use when they patrol downriver. The path from the city's East River Gate comes in along the top of the bank. The Muddywake lies west; the river flats of Kinsweave lie east.</title><rect x="1360" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4315</text><text x="1420.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Upriver Gate</text>
</g>
