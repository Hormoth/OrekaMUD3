<g><title>vnum 4001
River Street South

River Street continues south from the chapel quarter, the cobblestones giving way to smooth river-worn flagstones. Willows arch overhead, their trailing branches catching droplets from the ever-present mist that rises off the Great River.</title><rect x="1508" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4001</text><text x="1568.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">River Street South</text>
</g>
<g><title>vnum 4002
Riverside Promenade

A broad, curving walkway follows the Great River's north bank. Crystal lampposts line the path, their enchanted flames casting prismatic light across the water. Pekakarlik-crafted benches of river-smoothed basalt invite contemplation, and the sound of the current is a constant, soothing companion.</title><rect x="1508" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4002</text><text x="1568.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Riverside Promenade</text>
</g>
<g><title>vnum 4003
The River Terrace

Stone steps descend to the water's edge where a broad terrace overlooks the Great River. The Pekakarlik engineers who built this terrace carved Water-element runes into each step. On clear days, the Aetherial Veil's shimmer is reflected in the river's surface, doubling the sky.</title><rect x="916" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4003</text><text x="976.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The River Terrace</text>
</g>
<g><title>vnum 4004
Riverbank Landing

A natural stone landing where small boats are moored among the reeds. Pekakarlik fishermen mend nets here at dawn, working in easy rhythm with the river's current. A weathered shrine to Kaile'a, Mistress of Waves, stands watch over the boats.</title><rect x="916" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="976.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4004</text><text x="976.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Riverbank Landing</text>
</g>
<g><title>vnum 4005
The Wavecrest Inn

A sprawling riverside inn built from pale riverstone and living willow, its balconies extending over the water on crystal-reinforced pylons. The innkeeper, a stout Pekakarlik woman, keeps the common room warm with a driftwood fire and the scent of river-herb stew. The sound of the Great River lapping at the pylons below serves as a lullaby for weary travelers.</title><rect x="1064" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1124.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4005</text><text x="1124.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Wavecrest Inn</text>
</g>
<g><title>vnum 4006
Fishmonger's Row

The air is thick with the briny scent of fresh river fish and the calls of Pekakarlik fishwives hawking the morning catch. Stalls of woven river-reed display silverfin, glacial trout, and the iridescent cave-perch prized by elven kitchens. Water channels cut into the street keep the catch fresh, their flow maintained by Pekakarlik hydraulic craft.</title><rect x="1064" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1124.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4006</text><text x="1124.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Fishmonger's Row</text>
</g>
<g><title>vnum 4007
Kaile'a's Shrine

A circular plaza paved in blue-veined marble surrounds a fountain sculpted in Kaile'a's image -- a woman formed of living water, arms raised to the sky. Offerings of river-pearls and carved shells line the fountain's rim. A cool mist drifts from the fountain, and Pekakarlik clerics tend the shrine at all hours.</title><rect x="1064" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1124.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4007</text><text x="1124.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Kaile'a's Shrine</text>
</g>
<g><title>vnum 4008
South Gate

The Great South Gate of Custos do Aeternos rises in an arch of crystal-veined granite, carved with scenes of river voyages and the founding of the city. Two crystal spires flank the gate, their tips catching the Aetherial Veil's light. Beyond the gate, the Great River Road leads south through rolling hills toward Greenford. Guards in wind-silk tabards check travelers entering and leaving.</title><rect x="1064" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1124.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4008</text><text x="1124.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">South Gate</text>
<text x="1124.0" y="2360" text-anchor="middle" fill="#6a84a8" font-size="10">up→4156</text>
</g>
<g><title>vnum 4009
Pekakarlik Aqueduct Walk

A covered walkway runs along one of the great aqueducts that the Pekakarlik Dwarves maintain for the city. Water rushes through the elevated channel above, its passage creating a rhythmic drumming that Pekakarlik residents describe as comforting. Dwarf-height doors line the walkway, leading to maintenance tunnels and the homes of aqueduct engineers.</title><rect x="1212" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4009</text><text x="1272.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Pekakarlik Aqueduct …</text>
</g>
<g><title>vnum 4010
Waterfolk Quarter

A quiet residential neighborhood where Pekakarlik Dwarves have made their home for generations. The buildings are low and solid, built from river-smoothed basalt with doors sized for Small folk. Window boxes overflow with water lilies and river-moss, and small channels run along the gutters, connecting each home to the aqueduct system.</title><rect x="916" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4010</text><text x="976.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Waterfolk Quarter</text>
</g>
<g><title>vnum 4011
Pekakarlik Bathhouse

A domed building of pale stone from which fragrant steam perpetually rises. The Pekakarlik bathhouse is open to all Kin, though the pools are sized for both Small and Medium folk in separate chambers. Hot springs channeled from beneath the Giant's Teeth feed the baths, and the mingling of the geothermally warmed water and the cool stone creates a unique therapeutic atmosphere.</title><rect x="916" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4011</text><text x="976.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Pekakarlik Bathhouse</text>
</g>
<g><title>vnum 4012
Deepwell Tavern

A cozy, low-ceilinged tavern built half below street level, its walls lined with river-stone and hung with fishing trophies. Pekakarlik ale -- dark, mineral-rich, and faintly luminescent -- is the house specialty. A permanent card game occupies the corner booth, and river-shanties echo from the back room most evenings. The ceiling is uncomfortably low for tall folk, but the welcome is warm.</title><rect x="768" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="828.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4012</text><text x="828.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Deepwell Tavern</text>
<text x="828.0" y="2360" text-anchor="middle" fill="#6a84a8" font-size="10">down→4200</text>
</g>
<g><title>vnum 4013
Dock Street South

Dock Street angles southeast from the chapel quarter, growing busier and louder with each step. Crates and barrels line the street edges, and the air carries the mingled scents of tar, rope, and exotic spices from upriver. Dockworkers -- mostly humans and Pekakarlik -- jostle past with loads balanced on shoulders and heads.</title><rect x="1360" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4013</text><text x="1420.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dock Street South</text>
</g>
<g><title>vnum 4014
The Wharves

A long wooden wharf extends into the Great River, its pilings reinforced with Pekakarlik stonework. Trade barges from Greenford, Forkmeet, and Stoneharbor crowd the moorings, their cargo booms swinging overhead. The phrase 'as the river runs' is heard constantly as merchants seal deals over clasped hands. Kaile'a's sigil is painted on every barge prow.</title><rect x="1212" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1272.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4014</text><text x="1272.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Wharves</text>
</g>
<g><title>vnum 4015
Harbormaster's Office

A sturdy stone building with a commanding view of the river wharves. The Harbormaster -- a weathered human woman with ink-stained fingers -- manages the flow of river commerce with brisk efficiency. Charts, manifests, and a large river map cover every wall. A brass speaking-trumpet hangs by the door for hailing incoming barges.</title><rect x="1656" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4015</text><text x="1716.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Harbormaster's Office</text>
</g>
<g><title>vnum 4016
Warehouse Row

A line of massive stone warehouses stretches along the riverbank, their iron-banded doors sealed with Trade House locks. Pekakarlik-engineered drainage channels keep the floors dry, and thick stone walls protect sensitive cargo from the elements. Armed guards from the Trade Houses patrol with practiced vigilance.</title><rect x="1212" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4016</text><text x="1272.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Warehouse Row</text>
</g>
<g><title>vnum 4017
Chandler's Market

A bustling open-air market where ship's chandlers sell everything a river trader needs: rope, tar, sailcloth, navigational charts, and preserved rations. The stalls are a mix of permanent shops and temporary blankets spread by traveling merchants. The scent of hemp and tallow mingles with the sharper tang of alchemical waterproofing compounds.</title><rect x="1360" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4017</text><text x="1420.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Chandler's Market</text>
</g>
<g><title>vnum 4018
Riverwind Trading Post

The largest Trade House office in the dock district occupies a handsome two-story building of crystal-veined limestone. Inside, factors negotiate contracts for grain, timber, ore, and magical components. A large Kaile'a shrine occupies the entrance hall, and deals are sealed with river-water rather than wax.</title><rect x="1360" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4018</text><text x="1420.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Riverwind Trading Post</text>
</g>
<g><title>vnum 4019
Sailor's Rest

A rough-and-ready dockside inn with rooms above and a common room below that smells permanently of river-damp wool and strong ale. The beds are clean enough, the food hearty if plain, and the innkeeper asks no questions about cargo or destination. Dockworkers and river-sailors crowd the common room each evening, trading stories and dice games.</title><rect x="1656" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1716.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4019</text><text x="1716.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sailor's Rest</text>
</g>
<g><title>vnum 4020
Rope Street

A narrow lane lined with rope-makers, net-weavers, and sail-menders. The rhythmic thwack of rope being twisted and the rattle of shuttle-looms create a constant industrial percussion. Halfling apprentices scramble between workshops carrying bundles of hemp and spools of treated cord.</title><rect x="1508" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4020</text><text x="1568.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Rope Street</text>
</g>
<g><title>vnum 4021
Dockside Shrine of Semyon

A small, warm chapel tucked between warehouses, maintained by a kindly Pasua cleric. Inside, the hearthstone glows with Semyon's sigil, and the walls are lined with tokens left by sailors' families -- prayers for safe return, thanks for healing, small carved boats that children have brought. The chapel serves as an informal infirmary for dock injuries.</title><rect x="1360" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1420.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4021</text><text x="1420.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dockside Shrine of S…</text>
</g>
<g><title>vnum 4022
Customs House

An imposing stone building where all goods entering Custos do Aeternos by river are inspected and taxed. Customs officers inspect merchants and their goods with practiced efficiency, cross-referencing manifests against cargo. Discrepancies draw immediate scrutiny.</title><rect x="1212" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4022</text><text x="1272.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Customs House</text>
</g>
<g><title>vnum 4023
Smuggler's Dock

A crumbling section of the old river wall where the stones have settled and the lampposts have conveniently never been repaired. By day it looks like an abandoned quay; by night, small boats slip in and out with cargoes that never pass through the Customs House. The Unstrung maintain a discreet interest in this stretch of riverbank.</title><rect x="1212" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4023</text><text x="1272.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Smuggler's Dock</text>
</g>
<g><title>vnum 4024
East River Gate

The eastern gate straddles the Great River Road where it follows the bank toward Forkmeet and Stoneharbor. Built of the same crystal-veined granite as the South Gate, it features carved reliefs of river barges and the twin rivers that give the region its name. A toll booth collects bridge-crossing fees, and river traffic passes through a water-gate below.</title><rect x="1360" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4024</text><text x="1420.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">East River Gate</text>
</g>
<g><title>vnum 4025
Temple Street East

The lane continues east from the chapel quarter, growing quieter and more reverent with each step. Crystal lanterns hang from wrought-iron brackets, casting a soft, steady light that never flickers. The flagstones are swept immaculate, and the air carries the scent of sacred incense -- a blend of sky-lotus, river-sage, and mountain cedar that honors all four elements.</title><rect x="28" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="88.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4025</text><text x="88.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Temple Street East</text>
</g>
<g><title>vnum 4026
Plaza of the Ascended

A grand circular plaza paved in alternating bands of white marble and blue-veined granite. At its center stands a monument to the Ascended Gods -- five pillars of crystal representing Cinvarin, the Five Witnesses, surrounded by smaller shrines to each of the other Ascended. The plaza serves as the spiritual heart of the city's formal religious life, distinct from the elemental worship of the chapel.</title><rect x="176" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4026</text><text x="236.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Plaza of the Ascended</text>
</g>
<g><title>vnum 4027
Temple of Cinvarin

A contemplative temple built of five different stones -- one for each of the Five Witnesses who sacrificed themselves at Aldenheim. The interior is a single round chamber where five eternal flames burn in silence, each a different elemental color. Circle of Deeproot druids maintain the temple, and worship here is quiet: vigils, elemental offerings, and the recitation of the Five Names.</title><rect x="176" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4027</text><text x="236.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Temple of Cinvarin</text>
</g>
<g><title>vnum 4028
Shrine of Apela Kelsoe

A soaring open-air shrine where windchimes of crystal and silver hang from graceful arches. The Windrider's shrine catches every breeze, filling the air with ethereal music. Hasura Elves come here to pray for safe travel and good fortune, and small feather tokens left as offerings carpet the altar stones. The shrine's position catches the wind from the river valley below.</title><rect x="2100" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2160.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4028</text><text x="2160.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Shrine of Apela Kelsoe</text>
</g>
<g><title>vnum 4029
Temple of Kaile'a

A grand temple of blue-veined marble where water flows through channels carved into the walls, floor, and ceiling in defiance of gravity -- a masterwork of Pekakarlik hydraulic engineering and clerical magic. The Mistress of Waves' temple is the largest religious building outside the central chapel, reflecting her status as the Twin Rivers' most widely worshipped Ascended God.</title><rect x="1952" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2012.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4029</text><text x="2012.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Temple of Kaile'a</text>
</g>
<g><title>vnum 4030
Shrine of Semyon

A warm, domestic temple where a central hearthstone blazes with eternal fire. The Hearth Mother's shrine serves as the city's largest birthing house and counseling center. Midwives trained in both medicine and healing magic attend families of all races, and the walls are covered in tapestries depicting families of every Kin -- elven parents with dwarven children, human mothers holding halfling babes.</title><rect x="1952" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2012.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4030</text><text x="2012.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Shrine of Semyon</text>
</g>
<g><title>vnum 4031
Shrine of Ludus Galerius

A cairn of stacked stones stands in a small courtyard, maintained in the mountain tradition. The shrine to Stone's Hand is simpler than the other temples -- a deliberate choice that reflects Galerius's portfolio of endurance and humility. Kovaka Elves and Pekakarlik Dwarves are the most frequent visitors, leaving small carved stones as offerings.</title><rect x="176" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4031</text><text x="236.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Shrine of Ludus Gale…</text>
</g>
<g><title>vnum 4032
Shrine of Gonmareck Ritler

An anvil-altar of black iron stands beneath a forge-roof in this shrine to Gunny. The smell of heated metal lingers permanently, and the shrine doubles as a working forge where blades are blessed and apprentices take oaths over glowing steel. Veterans and smiths come here to honor discipline and honest craft. Visiting Chainless Legion traders sometimes kneel here in quiet devotion.</title><rect x="324" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="384.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4032</text><text x="384.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Shrine of Gonmareck …</text>
</g>
<g><title>vnum 4033
Clergy Quarters

A quiet residential cloister behind the great temples, where priests, druids, and acolytes of the various Ascended Gods maintain their living quarters. Small gardens grow sacred herbs between the dormitories, and a communal kitchen feeds the clergy three times daily. The atmosphere is scholarly and contemplative, with debates over theology as common as prayers.</title><rect x="2100" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2160.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4033</text><text x="2160.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Clergy Quarters</text>
</g>
<g><title>vnum 4034
Hall of Healing

A long, airy building with crystal-paned windows that flood the interior with refracted light. Clerics of Kaile'a and Semyon work together here, tending the sick and injured. Beds line the walls, each screened with wind-silk curtains. The healing magic practiced here is cool and soothing, though Semyon's clerics add warmth to the touch.</title><rect x="2100" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2160.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4034</text><text x="2160.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Hall of Healing</text>
</g>
<g><title>vnum 4035
Temple Garden

A walled garden where sacred plants from all four elemental traditions grow in carefully tended beds. Fire-flowers bloom beside water-lilies, earth-moss carpets the paths, and wind-orchids sway on invisible breezes. The Circle of Deeproot tends this garden as a living demonstration of elemental harmony. It is open to all and serves as a place of quiet meditation.</title><rect x="620" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4035</text><text x="680.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Temple Garden</text>
</g>
<g><title>vnum 4036
The Reliquary

A fortified vault beneath the Temple of Cinvarin where holy relics and dangerous artifacts are stored under guard. The walls are lined with specially treated basalt that muffles magical energy. Only senior clergy may enter without escort.</title><rect x="1952" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2012.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4036</text><text x="2012.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Reliquary</text>
</g>
<g><title>vnum 4037
Mystic Street Northeast

The lane winds northeast from the chapel quarter, the air growing thick with the tingle of ambient magic. Arcane symbols are etched into the cobblestones, glowing faintly with residual enchantment. Crystal wind-chimes hanging from every doorway create a shifting, ethereal melody.</title><rect x="176" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="236.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4037</text><text x="236.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Mystic Street Northe…</text>
</g>
<g><title>vnum 4038
The Arcanist's Arcade

A covered market of arcane wares where spell components, enchanted trinkets, and magical curiosities are bought and sold. Stalls shimmer with minor illusions advertising their contents -- a Pasua merchant's specialty. The air crackles faintly with competing enchantments, and a permanent Detect Magic aura makes the entire arcade glow to those with the sight.</title><rect x="324" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="384.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4038</text><text x="384.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Arcanist's Arcade</text>
</g>
<g><title>vnum 4039
Enchanter's Workshop

A tall, narrow building where a Hasura enchantress plies her trade. Shelves line every wall from floor to ceiling, packed with half-finished wands, rings awaiting gems, and scrolls drying on crystal racks. The workshop hums with contained magical energy, and visitors can feel the hair on their arms stand on end. Custom enchantments are available for those with patience and coin.</title><rect x="324" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="384.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4039</text><text x="384.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Enchanter's Workshop</text>
</g>
<g><title>vnum 4040
The Starweave Salon

An elegant parlor where Na'wasua seers offer divination services -- stellar readings and mystical consultations. The interior is decorated in deep indigo with silver star-maps covering the ceiling. Curtained alcoves provide privacy for consultations. The Na'wasua proprietor carries himself with the quiet composure characteristic of his subrace -- unhurried and contemplative, like the space between stars.</title><rect x="472" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="532.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4040</text><text x="532.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Starweave Salon</text>
</g>
<g><title>vnum 4041
Illusionist's Lane

A short lane where reality is unreliable. Pasua illusionists maintain permanent glamours on their shopfronts, and the buildings seem to shift and shimmer as you walk past. One doorway appears to lead into a forest glade; another opens onto a starlit void. The illusions are harmless but disorienting to newcomers. Only the cobblestones underfoot remain stubbornly real.</title><rect x="768" y="2544" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="2562" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4041</text><text x="828.0" y="2606.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Illusionist's Lane</text>
</g>
<g><title>vnum 4042
Na'wasua Observatory

A slender crystal tower rising above the surrounding rooftops, its upper chambers filled with astronomical instruments of breathtaking precision. Na'wasua Elves chart the movements of stars, moons, and the strange celestial anomalies that may foretell coming change. The observatory's crystal dome can be opened to the sky, and on clear nights, the view of the heavens through the Aetherial Veil is indescribably beautiful.</title><rect x="472" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4042</text><text x="532.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Na'wasua Observatory</text>
</g>
<g><title>vnum 4043
The Scroll Emporium

A cramped, wonderful shop stuffed floor to ceiling with scrolls, tomes, and loose pages of arcane notation. The proprietor -- an ancient Pasua Elf with ink-stained fingers and spectacles of crystal -- claims to have a copy of every spell written since the founding of Custos. This is certainly an exaggeration, but not by as much as one might think.</title><rect x="768" y="2692" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="2710" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4043</text><text x="828.0" y="2754.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Scroll Emporium</text>
</g>
<g><title>vnum 4044
Alchemist's Row

A short stretch of road where three competing alchemists maintain their shops. The air is a complex stew of chemical scents -- sulfur, rose-oil, quicksilver, and things less identifiable. Occasional small explosions from the back rooms punctuate the day, drawing resigned sighs from the neighbors. Potions, elixirs, tinctures, and the occasional regrettable experiment are available for purchase.</title><rect x="768" y="2840" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="2858" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4044</text><text x="828.0" y="2902.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Alchemist's Row</text>
</g>
<g><title>vnum 4045
The Resonance Chamber

A domed chamber of specially tuned crystal used for the study and amplification of magical phenomena. Na'wasua researchers use this facility to experiment with the boundaries of magical detection, and the Circle of Deeproot occasionally borrows the chamber for elemental analysis. Visitors describe standing in the chamber as an uncanny experience, as though the crystal walls reflect something unseen back at them.</title><rect x="1952" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4045</text><text x="2012.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Resonance Chamber</text>
</g>
<g><title>vnum 4046
Crystal Spire Garden

A small public garden at the base of one of the city's signature crystal spires. The spire rises a hundred feet overhead, its faceted surface catching and scattering the Aetherial Veil's light into a permanent rainbow. Benches of carved crystal invite rest, and the garden is a popular spot for lovers, poets, and anyone seeking a moment of beauty in a busy day.</title><rect x="916" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4046</text><text x="976.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Crystal Spire Garden</text>
</g>
<g><title>vnum 4047
Familiar's Rest

A peculiar establishment that caters to the bonded companions of the city's spellcasters. Comfortable stalls house familiars -- cats, ravens, foxes, tiny elementals -- while their masters conduct business in the Mystic Quarter. A halfling attendant with an uncanny talent for animal handling manages the menagerie with cheerful competence.</title><rect x="916" y="2544" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="2562" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4047</text><text x="976.0" y="2606.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Familiar's Rest</text>
</g>
<g><title>vnum 4048
Veil Watcher's Terrace

A high terrace at the northeast edge of the Mystic Quarter, offering the city's clearest ground-level view of the Aetherial Veil. From here, the shimmering magical barrier that protects Custos do Aeternos is visible as a vast, translucent dome overhead, its colors shifting through spectra that have no names in Common. Lately, scholars have observed the Veil pulsing erratically -- flickers and gaps that were never seen before.</title><rect x="176" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="236.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4048</text><text x="236.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Veil Watcher's Terrace</text>
</g>
<g><title>vnum 4049
Scholar Street North

The avenue continues north from the chapel quarter, its buildings growing taller and more austere. Libraries, bookshops, and lecture halls line both sides, their facades decorated with carved quotations from famous scholars. Students of all races hurry between buildings clutching scrolls and ink-pots, their animated debates spilling into the street.</title><rect x="1360" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1420.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4049</text><text x="1420.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scholar Street North</text>
</g>
<g><title>vnum 4050
Academy Square

A broad plaza at the heart of the Scholar's District, paved in white marble and centered on a fountain that takes the form of an open book carved from living crystal. Benches ring the fountain where students study, argue, and occasionally nap. The buildings surrounding the square house the various faculties of the Academy of Sylaraeth -- the city's premier institution of learning.</title><rect x="768" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="828.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4050</text><text x="828.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Academy Square</text>
</g>
<g><title>vnum 4051
The Great Library of Sylaraeth

A magnificent building of crystal-veined white stone, its doors carved with the motto 'Knowledge Is the Wind That Lifts All Wings.' Inside, three floors of shelving hold the largest collection of texts in the Twin Rivers -- though Liraveth's scholars would dispute this claim. Hasura librarians maintain the collection with meticulous care, and a permanent Silence enchantment ensures that the only sound is the whisper of turning pages.</title><rect x="768" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="828.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4051</text><text x="828.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Great Library of…</text>
</g>
<g><title>vnum 4052
Rare Manuscripts Hall

A vault-like chamber within the Great Library where the most precious texts are kept under magical and physical lock. Pre-Shattering documents, Giant-era rubbings, and original treaties between the Kin occupy crystal display cases. Scholars must petition for access, and a Na'wasua archivist screens applicants with exacting intellectual rigor.</title><rect x="1656" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1716.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4052</text><text x="1716.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Rare Manuscripts Hall</text>
</g>
<g><title>vnum 4053
Lecture Hall of the Elements

A great amphitheater-style hall where the Academy's senior faculty deliver lectures on elemental theory and the natural philosophy of Oreka. The tiered seating holds three hundred, and the demonstration floor at the center features elemental containment circles for practical instruction. Visiting scholars from Liraveth and Aerithal frequently guest-lecture here.</title><rect x="1656" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4053</text><text x="1716.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Lecture Hall of the …</text>
</g>
<g><title>vnum 4054
Laboratory of Applied Magic

A working laboratory where Academy researchers study the intersection of elemental magic and practical craft. Carefully calibrated instruments -- crystal tuning forks, elemental spectrometers, and measuring stones -- line the workbenches. Experiments here are sometimes felt throughout the district as brief, strange fluctuations in the ambient magical energy.</title><rect x="1804" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4054</text><text x="1864.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Laboratory of Applie…</text>
</g>
<g><title>vnum 4055
Star Chart Archive

A dimly lit chamber where celestial observations from the Na'wasua Observatory are catalogued and stored. Thousands of star charts, some dating back centuries, hang from rotating racks. The archive serves as a bridge between the Mystic Quarter's observational work and the Academy's theoretical scholarship. A permanent illusion of the night sky covers the ceiling, updating in real time.</title><rect x="1656" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4055</text><text x="1716.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Star Chart Archive</text>
</g>
<g><title>vnum 4056
Scholar's Bookshop

A rambling, overstuffed bookshop that occupies three connected townhouses. The proprietor, a human with an encyclopedic memory, claims he can find any text in the Twin Rivers given sufficient time and coin. Towers of books lean at alarming angles, connected by narrow paths. The shop cat -- a ginger tom of exceptional size -- is the true authority here.</title><rect x="620" y="768" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="680.0" y="786" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4056</text><text x="680.0" y="830.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scholar's Bookshop</text>
</g>
<g><title>vnum 4057
The Quill and Scroll

A modest inn catering to visiting scholars and students too absorbed in study to walk home. The rooms are small but clean, each equipped with a writing desk, good lamp, and a shelf of reference texts. The common room doubles as an informal debate hall, and academic arguments over dinner frequently continue past midnight. The ale is adequate; the conversation is excellent.</title><rect x="620" y="916" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="680.0" y="934" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4057</text><text x="680.0" y="978.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Quill and Scroll</text>
</g>
<g><title>vnum 4058
Scribe's Lane

A row of professional scriptoriums where scribes copy manuscripts, illuminate texts, and prepare official documents. The scratch of quills and the scent of fresh ink fill the air. Several scribes specialize in magical notation, producing spell scrolls and enchanted contracts. The lane connects the Scholar's District to the Grand Avenue district to the west.</title><rect x="620" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="680.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4058</text><text x="680.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Scribe's Lane</text>
</g>
<g><title>vnum 4059
Student Quarter

A lively residential neighborhood where Academy students share cramped but affordable lodgings. The buildings are older, the paint peeling, but the energy is young and vibrant. Music drifts from upper windows, and the smell of cheap but filling food wafts from ground-floor cookshops. Arguments about philosophy and magic echo at all hours.</title><rect x="472" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="532.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4059</text><text x="532.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Student Quarter</text>
</g>
<g><title>vnum 4060
The Tipsy Owl Tavern

A student tavern of legendary reputation, its walls covered in graffiti, carved initials, and the occasional arcane formula. The ale is cheap, the meat pies are surprisingly good, and the barkeep -- a retired adventurer with stories for every occasion -- tolerates academic excess with amused patience. On festival nights, illusion-duels between rival student factions light up the common room.</title><rect x="176" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="236.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4060</text><text x="236.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Tipsy Owl Tavern</text>
</g>
<g><title>vnum 4061
Market Street Northwest

Market Street broadens as it continues northwest from the chapel quarter, the bustle intensifying with every step. Colorful awnings and merchant banners line both sides, and the calls of vendors in Common, Elvish, and Dwarvish create a polyglot chorus.</title><rect x="2692" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2752.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4061</text><text x="2752.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Market Street Northw…</text>
</g>
<g><title>vnum 4062
Central Market Square

The beating commercial heart of Custos do Aeternos -- a vast open square where permanent stalls, temporary blankets, and mobile carts create a labyrinth of goods from across the Twin Rivers and beyond. Grain from Greenford, ore from Stoneharbor, wind-silk from the canopy cities, and exotic spices from distant regions all change hands here.</title><rect x="2544" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2604.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4062</text><text x="2604.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Central Market Square</text>
</g>
<g><title>vnum 4063
The Golden Bazaar

An upscale section of the market where luxury goods are sold: enchanted jewelry, illusionary textiles, spiced teas, and the crystalline art objects for which Custos is famous. Pasua merchants hold court here, their natural charm making every transaction feel like a gift between friends. Prices are correspondingly elevated.</title><rect x="2544" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2604.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4063</text><text x="2604.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Golden Bazaar</text>
</g>
<g><title>vnum 4064
Wind-Silk Merchants

A cluster of shops specializing in wind-silk -- the magical fabric woven in the canopy cities that is Custos do Aeternos's most famous export. Bolts of shimmering cloth in impossible colors hang from every rafter, catching the breeze and rippling like living things. A Hasura weaver demonstrates her art on a crystalline loom, drawing small crowds of admirers.</title><rect x="2396" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2456.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4064</text><text x="2456.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Wind-Silk Merchants</text>
</g>
<g><title>vnum 4065
Trade House Offices

A row of handsome stone buildings housing the major Trade Houses that control commerce in the Twin Rivers. Inside, factors and clerks manage the flow of goods with ruthless efficiency. The Trade Houses have adopted Kaile'a as an unofficial patron, and her sigil decorates every door. Competition between houses is fierce but generally kept within the bounds of law -- generally.</title><rect x="2100" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2160.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4065</text><text x="2160.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Trade House Offices</text>
</g>
<g><title>vnum 4066
Money-Changer's Row

A short lane where currency exchange, banking, and moneylending are conducted. The money-changers -- mostly humans with sharp eyes and sharper arithmetic -- convert between the various coinages used across Oreka. Strongboxes of iron-banded oak line the back rooms, and armed guards are a constant presence. The rates are fair, if not generous.</title><rect x="2396" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2456.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4066</text><text x="2456.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Money-Changer's Row</text>
</g>
<g><title>vnum 4067
Spice Market

A fragrant corner of the market district where exotic spices, herbs, and tea blends from across Oreka are sold. The air is a heady mix of cinnamon, star-anise, river-pepper, and the sharp, bright scent of sky-lotus. Pasua tea merchants brew samples in tiny crystal cups, and the competition for the best blends is a source of passionate civic pride.</title><rect x="2396" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2456.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4067</text><text x="2456.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Spice Market</text>
</g>
<g><title>vnum 4068
Market Tavern -- The Laughing Elf

A large, cheerful tavern at the edge of the market square, popular with merchants, off-duty guards, and anyone looking for a hot meal and cold ale after a day of trading. The sign depicts a Pasua Elf doubled over with laughter. The tavern is famous for its river-fish stew and its bardic entertainment -- Pasua performers hold court most evenings, and the singing often becomes communal.</title><rect x="2692" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2752.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4068</text><text x="2752.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Market Tavern -- The…</text>
</g>
<g><title>vnum 4069
Halfling Market Row

A charming section of the market where the city's halfling community conducts much of its commerce. The stalls are halfling-height, the wares are practical -- cooking implements, garden tools, pipe-weed, preserves -- and the proprietors are unfailingly cheerful. Halfling market culture emphasizes generous portions, fair dealing, and the firm belief that a sample freely given is a sale half-made.</title><rect x="2840" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2900.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4069</text><text x="2900.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Halfling Market Row</text>
</g>
<g><title>vnum 4070
The Provisioner

A large general store occupying a converted warehouse, stocking everything an adventurer, traveler, or homemaker might need. Rope, rations, lanterns, bedrolls, waterskins, and a hundred other practical necessities fill the shelves. The shop is owned by a partnership of a human and a Pekakarlik, and their complementary skills -- the human's eye for market trends and the dwarf's quality standards -- make this the most reliable supply shop in the city.</title><rect x="2840" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2900.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4070</text><text x="2900.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Provisioner</text>
</g>
<g><title>vnum 4071
Courier's Guild Post

A busy office where the Courier's Guild maintains its Custos headquarters. Runners -- mostly young humans and halflings -- are dispatched throughout the city and to other settlements carrying messages, small packages, and urgent correspondence. A large board displays current job postings and the estimated travel times to every settlement in the Twin Rivers.</title><rect x="2692" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2752.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4071</text><text x="2752.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Courier's Guild Post</text>
</g>
<g><title>vnum 4072
Market Gate

A secondary city gate on the northwest side, smaller than the cardinal gates but busy with merchant traffic. Carts loaded with goods queue in both directions, and the guards here are more interested in cargo manifests than weapons. This gate connects to the trade road that leads northwest toward the Windweave Glade and the canopy cities, though the North Gate is the primary route.</title><rect x="2692" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2752.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4072</text><text x="2752.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Market Gate</text>
</g>
<g><title>vnum 4073
Guild Street West

A stately avenue lined with the banners of the city's professional guilds. Each guildhall displays its heraldry proudly -- the Weavers' Guild's silver shuttle, the Brewers' Guild's golden tankard, the Healers' Guild's clasped hands -- and the architecture grows more imposing as the street continues west. The street connects the market district to the south with the guild quarter proper.</title><rect x="2248" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2308.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4073</text><text x="2308.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Guild Street West</text>
</g>
<g><title>vnum 4074
Guild Row

A broad avenue where the major guildhalls of Custos do Aeternos stand in ordered grandeur. Each building reflects the character of its guild -- the Stonemasons' Hall is a fortress of granite, the Musicians' Guild is a graceful tower of crystal and living wood, and the Artificers' Guild hums with contained magical energy. Guild membership is the backbone of the city's middle class.</title><rect x="2100" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2160.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4074</text><text x="2160.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Guild Row</text>
</g>
<g><title>vnum 4075
Weavers' Guild

A tall building of pale stone draped with samples of the guild's finest work. Wind-silk banners flutter from every window, their colors shifting in the breeze. Inside, looms of crystal and living wood produce the magical textiles that are Custos's signature export. The Guildmaster, a Hasura weaver of extraordinary skill, accepts apprentices from all races.</title><rect x="2248" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2308.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4075</text><text x="2308.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Weavers' Guild</text>
</g>
<g><title>vnum 4076
Musicians' Guild

A soaring crystal tower whose walls are tuned to resonate with musical frequencies, creating an ever-present melodic background. Inside, Pasua bards, Na'wasua composers, and musicians of all races practice, perform, and teach. The guild's common hall hosts concerts that draw audiences from across the city, and its archive preserves the musical traditions of every Kin race.</title><rect x="2544" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2604.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4076</text><text x="2604.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Musicians' Guild</text>
</g>
<g><title>vnum 4077
Healers' Guild

A warm, welcoming guildhall where healers of all traditions -- clerical, druidic, and mundane -- share knowledge and coordinate the city's medical care. The guild maintains a free clinic on the ground floor and a training hospital above. Clerics of Semyon and Kaile'a work alongside herbalists and surgeons, and the guild's reputation for competence crosses all racial lines.</title><rect x="1212" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="1272.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4077</text><text x="1272.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Healers' Guild</text>
</g>
<g><title>vnum 4078
Artificers' Guild

The Artificers' Guild occupies a building that seems to vibrate with contained energy. Inside, artificers -- following the tradition of Mayor Caelith Windweaver herself -- combine arcane magic with practical craft to produce enchanted objects of extraordinary quality. The workshops are noisy, sometimes dangerous, and always fascinating. Apprenticeships here are highly competitive.</title><rect x="1212" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4078</text><text x="1272.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Artificers' Guild</text>
</g>
<g><title>vnum 4079
Merchants' Guild

A prosperous-looking guildhall of polished stone and brass fittings, where the commercial interests of Custos's non-Trade-House merchants are represented. The guild arbitrates disputes, sets quality standards, and maintains the market rules that keep commerce orderly. A large meeting hall on the upper floor hosts weekly trade councils.</title><rect x="1804" y="2100" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="2118" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4079</text><text x="1864.0" y="2162.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Merchants' Guild</text>
</g>
<g><title>vnum 4080
Adventurers' Guild

A rough-hewn guildhall that stands in deliberate contrast to its more refined neighbors. Inside, a large notice board displays job postings -- monster bounties, escort requests, exploration contracts, and the occasional discreet 'problem resolution' inquiry. A grizzled human guildmaster manages the roster of registered adventurers with the weary competence of someone who has seen everything.</title><rect x="1064" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1124.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4080</text><text x="1124.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Adventurers' Guild</text>
</g>
<g><title>vnum 4081
Guildmaster's Court

A handsome courtyard surrounded by the senior guildhalls, where the Guildmasters of Custos do Aeternos meet monthly to discuss matters of shared concern. A crystal fountain at the center changes color with the seasons. Benches of carved stone line the walls, and the courtyard serves as neutral ground where inter-guild disputes are mediated under the Mayor's authority.</title><rect x="916" y="1064" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="1082" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4081</text><text x="976.0" y="1126.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Guildmaster's Court</text>
</g>
<g><title>vnum 4082
Western Walk

A quiet street connecting the Guild District to the Grand Avenue and administrative districts. The buildings here are a mix of guild offices, professional residences, and small specialized shops serving the guild community. The atmosphere is purposeful and industrious -- people here work with their hands and their minds, and are proud of both.</title><rect x="916" y="1212" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="976.0" y="1230" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4082</text><text x="976.0" y="1274.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Western Walk</text>
</g>
<g><title>vnum 4083
The Guildsman's Rest

A comfortable, respectable inn frequented by traveling guild members, journeymen on their wanderyear, and merchants with business at the guildhalls. The rooms are well-appointed, the common room serves excellent food, and the innkeeper -- a retired Weavers' Guild master -- maintains standards that reflect well on the guild community.</title><rect x="916" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4083</text><text x="976.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Guildsman's Rest</text>
</g>
<g><title>vnum 4084
The Hammer and Quill

A lively tavern at the intersection of the Guild and Artisan districts, where craftsfolk from both quarters gather to drink, argue, and occasionally collaborate. The name refers to the smith's hammer and the scribe's quill -- tools of the two most common trades represented in its clientele. The house special is a dark, malty ale brewed with Pekakarlik mineral water.</title><rect x="1064" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1124.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4084</text><text x="1124.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Hammer and Quill</text>
</g>
<g><title>vnum 4085
Artisan Street Southwest

The avenue turns southwest from the chapel quarter, the sounds of creative labor growing with each step -- hammers on wood, chisels on stone, the rhythmic clack of looms, and the occasional burst of song. Sawdust and stone-dust scent the air, and the workshops that line the street display their finest work in crystal-fronted windows.</title><rect x="1064" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1124.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4085</text><text x="1124.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Artisan Street South…</text>
</g>
<g><title>vnum 4086
Artisan Square

A bustling plaza at the heart of the artisan quarter, where craftsmen display and sell their work from permanent stalls. Woodcarvers, potters, glassblowers, leather-workers, and sculptors vie for attention, and the quality of work reflects the city's elven aesthetic -- even utilitarian objects are made beautiful. A central stage hosts demonstrations of craft techniques.</title><rect x="1064" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1124.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4086</text><text x="1124.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Artisan Square</text>
<text x="1124.0" y="1768" text-anchor="middle" fill="#6a84a8" font-size="10">down→4161</text>
</g>
<g><title>vnum 4087
Woodworker's Lane

A fragrant street where the scent of freshly cut timber fills the air. Hasura woodworkers shape living wood -- coaxing branches into furniture, instruments, and architectural elements without killing the tree. Pekakarlik carpenters work alongside them using more conventional methods, and the friendly rivalry between 'living-wood' and 'cut-wood' craftsmen is a source of constant good-natured argument.</title><rect x="1508" y="2248" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1568.0" y="2266" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4087</text><text x="1568.0" y="2310.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Woodworker's Lane</text>
</g>
<g><title>vnum 4088
Glassblower's Workshop

A cavernous workshop where master glassblowers create the crystal-clear vessels, windows, and art objects for which Custos is famous. The furnaces blaze with magical fire that produces no smoke, and the artisans work with an almost musical rhythm -- gathering, blowing, shaping, cooling -- that draws spectators. The workshop's display room sells pieces ranging from simple tumblers to elaborate crystal sculptures.</title><rect x="620" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="680.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4088</text><text x="680.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Glassblower's Workshop</text>
</g>
<g><title>vnum 4089
Potter's Court

A cobbled courtyard surrounded by pottery workshops where clay from the riverbanks is shaped into everything from simple cookware to elaborate ceremonial vessels. Kilns line the courtyard's south side, their steady warmth making this a popular gathering spot in cold weather. The Pekakarlik potters who work here use river-clay that has a subtle luminous quality, giving their finished pieces a soft, distinctive sheen.</title><rect x="768" y="1804" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="1822" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4089</text><text x="828.0" y="1866.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Potter's Court</text>
</g>
<g><title>vnum 4090
Sculptor's Garden

An open-air workshop and gallery where stone sculptors create and display their work. Figures carved from white marble, black basalt, and crystal-veined granite stand among living trees, blurring the line between art and nature. A Kovaka sculptor -- one of the few in the city -- works in volcanic stone, and her pieces have a grounding, primal quality.</title><rect x="916" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="976.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4090</text><text x="976.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Sculptor's Garden</text>
</g>
<g><title>vnum 4091
Instrument Maker's Shop

A shop where musical instruments of extraordinary quality are crafted. Hasura lutes, Pasua story-drums, Pekakarlik water-pipes, and human fiddles hang from every rafter. The master luthier -- a Pasua Elf whose instruments are prized across the Twin Rivers -- takes commissions from musicians far and wide. Testing an instrument is encouraged, and the shop often fills with impromptu music.</title><rect x="768" y="1656" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="828.0" y="1674" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4091</text><text x="828.0" y="1718.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Instrument Maker's S…</text>
</g>
<g><title>vnum 4092
Dyer's Lane

A colorful street where cloth dyers practice their ancient art. Vats of vibrant color line the narrow lane, and bolts of freshly dyed fabric hang from lines strung between the buildings, creating a canopy of shifting hues. The dyers use both mundane and magical techniques -- some colors can only be achieved through enchantment -- and the results are spectacular.</title><rect x="1508" y="2544" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="2562" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4092</text><text x="1568.0" y="2606.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Dyer's Lane</text>
</g>
<g><title>vnum 4093
Leather-Worker's Row

Workshops where skilled leather-workers produce everything from boots to armor to the decorated book-bindings prized by the Scholar's District. The smell of tanned leather and neat's-foot oil is powerful but not unpleasant. A human master-saddler is the acknowledged master of the row, though a Pekakarlik armor-crafter runs a close second.</title><rect x="1656" y="2544" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1716.0" y="2562" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4093</text><text x="1716.0" y="2606.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Leather-Worker's Row</text>
</g>
<g><title>vnum 4094
Tinker's Alley

A narrow, twisting passage lined with the tiny workshops of tinkers, clock-makers, and inventors. The air is filled with the ticking of mechanisms and the occasional spark of a magical prototype being tested. Halfling tinkers are disproportionately represented, their small fingers and patient temperaments suited to the delicate work. Curious mechanical devices of uncertain purpose crowd every windowsill.</title><rect x="1656" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1716.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4094</text><text x="1716.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Tinker's Alley</text>
</g>
<g><title>vnum 4095
The Craftsman's Hearth

A warm, homey tavern that serves as the unofficial meeting hall of the artisan community. The walls are decorated with donations from regular patrons -- a carving here, a painted tile there -- creating a mosaic of the quarter's creative output. The food is simple, the ale is good, and the company is lively. Apprentices from every workshop gather here after hours.</title><rect x="1804" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1864.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4095</text><text x="1864.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Craftsman's Hearth</text>
</g>
<g><title>vnum 4096
Artisan Residential Lane

A quiet residential street where many of the quarter's craftsmen make their homes. The houses are modest but well-maintained, each reflecting its owner's trade -- a woodcarver's home has an ornately carved door, a potter's features ceramic tile-work, a glassblower's glows with colored-glass windows. Flower boxes and small gardens soften the stone facades.</title><rect x="2100" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="2160.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4096</text><text x="2160.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Artisan Residential …</text>
</g>
<g><title>vnum 4097
Forge Street West

The street continues west from the chapel quarter, the air growing warmer and tinged with the scent of hot metal and coal smoke. The rhythmic clang of hammers on anvils creates a percussive soundtrack, and the glow of forge-fires lights the lane from both sides. This is the domain of the smiths -- Pekakarlik, human, and Kovaka working side by side.</title><rect x="2248" y="1952" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="2308.0" y="1970" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4097</text><text x="2308.0" y="2014.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Forge Street West</text>
</g>
<g><title>vnum 4098
Forge Square

A broad, heat-hazed plaza at the center of the forge quarter, dominated by the Great Forge -- a communal smithy maintained by the Smelter's Guild where any smith can rent time at the anvil. The plaza is paved with heat-resistant volcanic stone, and the air shimmers with radiant warmth. The sound of hammering never entirely ceases, even at night.</title><rect x="1360" y="2840" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="2858" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4098</text><text x="1420.0" y="2902.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Forge Square</text>
</g>
<g><title>vnum 4099
Weaponsmith's Hall

A long, low building where master weaponsmiths produce blades, polearms, and other instruments of war. The finest work here rivals anything produced in Stoneharbor. Display racks show the smiths' art -- swords with crystal-inlaid hilts, spears with rune-etched heads, and the occasional masterwork that seems to hum with latent power even before enchantment.</title><rect x="1212" y="2840" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1272.0" y="2858" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4099</text><text x="1272.0" y="2902.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Weaponsmith's Hall</text>
</g>
<g><title>vnum 4100
Armorsmith's Workshop

A cavernous workshop where armor of every type is crafted. Pekakarlik smiths work the volcanic ore from the Giant's Teeth, producing a steel with a distinctive blue-black sheen. Human armorers focus on practical, field-tested designs, while the rare Kovaka smith produces mountain-warrior armor that combines earthen durability with brutal functionality.</title><rect x="1212" y="2988" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1272.0" y="3006" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4100</text><text x="1272.0" y="3050.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Armorsmith's Workshop</text>
</g>
<g><title>vnum 4101
Smelter's Guild Hall

The guild headquarters of the Smelter's Guild, one of the most powerful trade organizations in the forge quarter. Inside, the guildmaster -- a burly Pekakarlik with arms like tree trunks -- oversees operations with quiet authority. The hall features a Gonmareck Ritler anvil-altar where new apprentices swear their oaths.</title><rect x="1360" y="2692" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="2710" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4101</text><text x="1420.0" y="2754.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Smelter's Guild Hall</text>
</g>
<g><title>vnum 4102
Ore Warehouse

A fortified storage building where raw ore from Stoneharbor and the Giant's Teeth is stockpiled. The building is heavily guarded, its walls reinforced with specially treated stone to prevent magical theft. Iron, copper, silver, and rarer metals are stored in separate, locked vaults. The Smelter's Guild controls access with bureaucratic precision.</title><rect x="1212" y="2692" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1272.0" y="2710" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4102</text><text x="1272.0" y="2754.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Ore Warehouse</text>
</g>
<g><title>vnum 4103
Blacksmith's Row

A street of working smithies where journeyman and master blacksmiths produce the everyday metalwork that keeps a city running: nails, hinges, tools, horseshoes, locks, and a thousand other necessities. The forges here are smaller than those in the Great Forge but run constantly. The smiths are practical, no-nonsense craftsmen who take pride in utility over artistry.</title><rect x="1360" y="2988" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1420.0" y="3006" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4103</text><text x="1420.0" y="3050.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Blacksmith's Row</text>
</g>
<g><title>vnum 4104
Foundry Lane

A hot, smoky lane where the city's larger metalworking operations are conducted. The foundry produces cast-iron components, bronze fittings, and the structural metalwork used in the city's crystal spire architecture. The heat is intense, and workers strip to the waist despite the season. Pekakarlik hydraulic engineering keeps the cooling water flowing.</title><rect x="1952" y="1360" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="2012.0" y="1378" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4104</text><text x="2012.0" y="1422.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Foundry Lane</text>
</g>
<g><title>vnum 4105
Jeweler's Workshop

Tucked at the quieter end of the forge quarter, this elegant workshop is where raw gems and precious metals are transformed into the jewelry and ornamental metalwork for which Custos is known. The master jeweler -- a Pasua Elf with a Fire-element attunement rare among her kind -- produces pieces that are simultaneously beautiful and magical.</title><rect x="1064" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#c79a5e" stroke-width="2" /><text x="1124.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4105</text><text x="1124.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Jeweler's Workshop</text>
</g>
<g><title>vnum 4106
The Anvil Tavern

A forge-quarter tavern where smiths gather after their shifts, still smelling of smoke and sweat. The ale is served in iron tankards, the food is heavy and filling, and arm-wrestling tournaments are a nightly fixture. The walls are decorated with retired tools and notable pieces of metalwork. It is loud, hot, and deeply convivial.</title><rect x="1508" y="2396" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#5b677f" stroke-width="2" /><text x="1568.0" y="2414" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4106</text><text x="1568.0" y="2458.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">The Anvil Tavern</text>
</g>
<g><title>vnum 4107
Smith's Residential Row

A street of sturdy, heat-resistant homes where the forge quarter's smiths and their families live. The houses are built of volcanic stone and basalt -- practical materials that withstand the quarter's ambient heat. Gardens are rare, but window boxes of fire-resistant herbs provide spots of green. The community is tight-knit, and disputes are settled over the anvil.</title><rect x="768" y="1508" width="120" height="120" rx="8" ry="8" fill="#1a1f2e" stroke="#6cb38f" stroke-width="2" /><text x="828.0" y="1526" text-anchor="middle" fill="#8aa0c2" font-size="11">vnum 4107</text><text x="828.0" y="1570.0" text-anchor="middle" fill="#d9dce6" font-size="12" font-weight="600">Smith's Residential …</text>
</g>
<g><title>vnum 4108
West Gate
